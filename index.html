<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON STRIKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 480px;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .stat-block { display: flex; flex-direction: column; gap: 4px; }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #0ff8;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 900;
    color: #0ff;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff4;
    letter-spacing: 2px;
  }

  .stat-value.right { text-align: right; }

  #healthBar {
    width: 90px;
    height: 6px;
    background: #0ff1;
    border: 1px solid #0ff4;
    border-radius: 3px;
    overflow: hidden;
  }

  #healthFill {
    height: 100%;
    background: linear-gradient(90deg, #f0f, #0ff);
    box-shadow: 0 0 8px #f0f;
    transition: width 0.2s;
    width: 100%;
  }

  #bossBar {
    position: absolute;
    bottom: 90px; left: 50%;
    transform: translateX(-50%);
    width: 80%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    z-index: 10;
  }

  #bossLabel {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #f0f;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #f0f;
  }

  #bossBarOuter {
    width: 100%;
    height: 8px;
    background: #f0f1;
    border: 1px solid #f0f6;
    border-radius: 4px;
    overflow: hidden;
  }

  #bossBarFill {
    height: 100%;
    background: linear-gradient(90deg, #f00, #f0f);
    box-shadow: 0 0 10px #f0f;
    transition: width 0.15s;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #000d 60%, #0008 100%);
    z-index: 20;
  }

  #overlay h1 {
    font-size: clamp(36px, 12vw, 56px);
    font-weight: 900;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 50px #0ff6, 0 0 80px #0ff3;
    letter-spacing: 6px;
    margin-bottom: 8px;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.3; }
    99% { opacity: 1; }
  }

  #overlay .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #f0f8;
    letter-spacing: 5px;
    margin-bottom: 48px;
    text-shadow: 0 0 10px #f0f;
  }

  #overlay .score-display {
    font-size: 32px;
    font-weight: 700;
    color: #ff0;
    text-shadow: 0 0 20px #ff0;
    margin-bottom: 12px;
    display: none;
  }

  #overlay .high-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #ff08;
    letter-spacing: 3px;
    margin-bottom: 40px;
    display: none;
  }

  .btn {
    padding: 16px 48px;
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #000;
    background: linear-gradient(135deg, #0ff, #f0f);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 0 20px #0ff6, 0 0 40px #f0f4;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.96); box-shadow: 0 0 10px #0ff4; }

  .instructions {
    margin-top: 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #0ff5;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2;
  }

  #joystick-zone {
    position: absolute;
    bottom: 0; left: 0;
    width: 60%;
    height: 160px;
    z-index: 5;
  }

  #fire-zone {
    position: absolute;
    bottom: 0; right: 0;
    width: 40%;
    height: 160px;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #fire-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle, #f0f4, #f0f1);
    border: 2px solid #f0f8;
    box-shadow: 0 0 20px #f0f4, inset 0 0 20px #f0f2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.1s;
  }

  #fire-btn.firing {
    background: radial-gradient(circle, #f0f9, #f0f4);
    box-shadow: 0 0 30px #f0f8, inset 0 0 20px #f0f6;
    transform: scale(0.93);
  }

  #joystick-hint {
    position: absolute;
    bottom: 30px; left: 40px;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 2px solid #0ff2;
    box-shadow: 0 0 15px #0ff2;
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }

  #joystick-thumb {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle, #0ff8, #0ff3);
    border: 1px solid #0ff;
    box-shadow: 0 0 12px #0ff;
    pointer-events: none;
    transition: transform 0.05s;
  }

  #wave-announce {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(28px, 8vw, 40px);
    font-weight: 900;
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 50px #0ff;
    letter-spacing: 6px;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.4s;
  }

  #combo-display {
    position: absolute;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 700;
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
    letter-spacing: 3px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <div id="ui">
    <div class="stat-block">
      <span class="stat-label">SCORE</span>
      <span class="stat-value" id="scoreDisplay">0</span>
    </div>
    <div class="stat-block" style="align-items:flex-end">
      <span class="stat-label">WAVE</span>
      <span class="stat-value right" id="waveDisplay">1</span>
      <div id="healthBar"><div id="healthFill"></div></div>
    </div>
  </div>

  <div id="bossBar">
    <span id="bossLabel">◆ BOSS ◆</span>
    <div id="bossBarOuter"><div id="bossBarFill"></div></div>
  </div>

  <div id="wave-announce"></div>
  <div id="combo-display"></div>

  <div id="joystick-zone">
    <div id="joystick-hint">
      <div id="joystick-thumb"></div>
    </div>
  </div>

  <div id="fire-zone">
    <div id="fire-btn">🔥</div>
  </div>

  <div id="overlay">
    <h1>NEON<br>STRIKER</h1>
    <div class="subtitle">◆ CYBER ASSAULT ◆</div>
    <div class="score-display" id="finalScore">0</div>
    <div class="high-score" id="highScoreDisplay"></div>
    <button class="btn" id="startBtn">START</button>
    <div class="instructions">
      LEFT — MOVE SHIP<br>
      RIGHT — FIRE
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('gameWrapper');

let W, H;
function resize() {
  W = canvas.width = wrapper.clientWidth;
  H = canvas.height = wrapper.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── STATE ───────────────────────────────────────────────
let state = 'menu'; // menu | playing | dead
let score = 0, highScore = +localStorage.getItem('ns_hi') || 0;
let wave = 1, waveTimer = 0;
let combo = 0, comboTimer = 0;
let autoFire = false, autoFireTimer = 0;

// Player
const player = {
  x: 0, y: 0, w: 38, h: 48,
  vx: 0, vy: 0,
  hp: 5, maxHp: 5,
  invincible: 0,
  shield: 0,
  powerLevel: 1, // 1-3
  powerTimer: 0,
};

// Collections
let bullets = [], enemies = [], enemyBullets = [], particles = [], stars = [], pickups = [];
let boss = null;

// ─── INPUT ────────────────────────────────────────────────
const joystickZone = document.getElementById('joystick-zone');
const joystickHint = document.getElementById('joystick-hint');
const joystickThumb = document.getElementById('joystick-thumb');
const fireBtn = document.getElementById('fire-btn');

let joystickActive = false, joystickOrigin = {x: 0, y: 0}, joystickPos = {x: 0, y: 0};
let moveDir = {x: 0, y: 0};
let firing = false;

function getTouch(el, e) {
  for (let t of e.changedTouches) {
    if (document.elementFromPoint(t.clientX, t.clientY) === el ||
        el.contains(document.elementFromPoint(t.clientX, t.clientY))) return t;
  }
  return e.changedTouches[0];
}

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const rect = joystickZone.getBoundingClientRect();
  const t = e.changedTouches[0];
  joystickOrigin = { x: t.clientX - rect.left, y: t.clientY - rect.top };
  joystickPos = { ...joystickOrigin };
  joystickHint.style.left = (joystickOrigin.x - 40) + 'px';
  joystickHint.style.bottom = 'auto';
  joystickHint.style.top = (joystickOrigin.y - 40) + 'px';
  joystickActive = true;
}, {passive: false});

joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joystickActive) return;
  const rect = joystickZone.getBoundingClientRect();
  const t = e.changedTouches[0];
  const dx = t.clientX - rect.left - joystickOrigin.x;
  const dy = t.clientY - rect.top - joystickOrigin.y;
  const dist = Math.hypot(dx, dy);
  const max = 40;
  const clamp = Math.min(dist, max);
  const nx = (dx / dist || 0) * clamp;
  const ny = (dy / dist || 0) * clamp;
  joystickThumb.style.transform = `translate(${nx}px,${ny}px)`;
  moveDir = { x: dx / Math.max(dist, max), y: dy / Math.max(dist, max) };
}, {passive: false});

joystickZone.addEventListener('touchend', e => {
  e.preventDefault();
  joystickActive = false;
  moveDir = {x: 0, y: 0};
  joystickThumb.style.transform = '';
  joystickHint.style.left = '40px';
  joystickHint.style.top = 'auto';
  joystickHint.style.bottom = '30px';
}, {passive: false});

let fireTouchId = null;
fireBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  fireTouchId = e.changedTouches[0].identifier;
  firing = true;
  fireBtn.classList.add('firing');
}, {passive: false});

fireBtn.addEventListener('touchend', e => {
  e.preventDefault();
  firing = false;
  fireBtn.classList.remove('firing');
}, {passive: false});

// Keyboard fallback
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

// ─── STARS ────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      speed: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.6 + 0.2,
      color: Math.random() < 0.15 ? '#f0f' : Math.random() < 0.15 ? '#0ff' : '#fff'
    });
  }
}

// ─── PARTICLES ────────────────────────────────────────────
function spawnExplosion(x, y, color='#f80', count=16) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: 1, decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 4 + 1,
      color
    });
  }
}

function spawnHitParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(a) * 3,
      vy: Math.sin(a) * 3,
      life: 1, decay: 0.08,
      r: 2, color: '#fff'
    });
  }
}

function spawnScoreFloat(x, y, text) {
  particles.push({ type:'text', x, y, vy: -1.5, life: 1, decay: 0.025, text, color: '#ff0' });
}

// ─── BULLETS ──────────────────────────────────────────────
function fireBullet() {
  const pl = player.powerLevel;
  if (pl === 1) {
    bullets.push({ x: player.x, y: player.y - player.h/2, vx: 0, vy: -14, w: 4, h: 14, power: 1 });
  } else if (pl === 2) {
    bullets.push({ x: player.x - 10, y: player.y - player.h/2 + 8, vx: 0, vy: -14, w: 4, h: 14, power: 1 });
    bullets.push({ x: player.x + 10, y: player.y - player.h/2 + 8, vx: 0, vy: -14, w: 4, h: 14, power: 1 });
  } else {
    bullets.push({ x: player.x, y: player.y - player.h/2, vx: 0, vy: -16, w: 5, h: 16, power: 2 });
    bullets.push({ x: player.x - 14, y: player.y - player.h/2 + 10, vx: -1, vy: -14, w: 4, h: 14, power: 1 });
    bullets.push({ x: player.x + 14, y: player.y - player.h/2 + 10, vx: 1, vy: -14, w: 4, h: 14, power: 1 });
  }
}

// ─── ENEMIES ──────────────────────────────────────────────
const ENEMY_TYPES = {
  grunt: { w: 32, h: 32, hp: 1, speed: 2, score: 100, color: '#f04', size: 1 },
  heavy: { w: 44, h: 44, hp: 3, speed: 1.2, score: 300, color: '#f80', size: 1.4 },
  speeder: { w: 24, h: 24, hp: 1, speed: 4, score: 150, color: '#0ff', size: 0.8 },
  shooter: { w: 36, h: 36, hp: 2, speed: 1.5, score: 250, color: '#a0f', size: 1.1 },
};

function spawnEnemy(type, x, y, pattern) {
  const def = ENEMY_TYPES[type];
  enemies.push({
    x, y, w: def.w, h: def.h,
    hp: def.hp, maxHp: def.hp,
    speed: def.speed + wave * 0.15,
    type, color: def.color,
    score: def.score,
    size: def.size,
    pattern, patternT: 0,
    shootTimer: Math.random() * 120,
    angle: 0
  });
}

function spawnWave() {
  const waveAnnounce = document.getElementById('wave-announce');
  waveAnnounce.textContent = wave % 5 === 0 ? '⚠ BOSS WAVE ⚠' : `WAVE  ${wave}`;
  waveAnnounce.style.color = wave % 5 === 0 ? '#f0f' : '#0ff';
  waveAnnounce.style.opacity = '1';
  setTimeout(() => waveAnnounce.style.opacity = '0', 1800);

  if (wave % 5 === 0) {
    spawnBoss();
    return;
  }

  const count = Math.min(3 + wave, 12);
  const types = wave < 3 ? ['grunt'] :
                wave < 5 ? ['grunt', 'speeder'] :
                wave < 8 ? ['grunt', 'speeder', 'heavy'] :
                ['grunt', 'speeder', 'heavy', 'shooter'];

  for (let i = 0; i < count; i++) {
    const type = types[Math.floor(Math.random() * types.length)];
    const cols = Math.min(count, 6);
    const x = (W / (cols + 1)) * ((i % cols) + 1);
    const y = -60 - Math.floor(i / cols) * 70;
    const pat = Math.floor(Math.random() * 3);
    spawnEnemy(type, x, y, pat);
  }
}

function spawnBoss() {
  boss = {
    x: W / 2, y: -100,
    w: 90, h: 90,
    hp: 40 + wave * 5, maxHp: 40 + wave * 5,
    phase: 0, phaseT: 0,
    shootTimer: 0,
    angle: 0,
    entering: true,
    targetY: 130
  };
  document.getElementById('bossBar').style.display = 'flex';
  updateBossBar();
}

function updateBossBar() {
  if (!boss) return;
  const pct = Math.max(0, boss.hp / boss.maxHp * 100);
  document.getElementById('bossBarFill').style.width = pct + '%';
}

// ─── PICKUPS ──────────────────────────────────────────────
function maybeSpawnPickup(x, y) {
  if (Math.random() < 0.12) {
    const types = ['power', 'health', 'shield', 'bomb'];
    const t = types[Math.floor(Math.random() * types.length)];
    pickups.push({ x, y, type: t, vy: 1.5, life: 300, angle: 0 });
  }
}

// ─── DRAW HELPERS ─────────────────────────────────────────
function drawPlayer() {
  const { x, y, w, h, invincible } = player;
  if (invincible > 0 && Math.floor(invincible / 5) % 2) return;

  ctx.save();
  ctx.translate(x, y);

  // Engine glow
  const grd = ctx.createRadialGradient(0, h/2 + 10, 0, 0, h/2 + 10, 30);
  grd.addColorStop(0, '#0ff8');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(-20, h/2, 40, 40);

  // Engine flames
  ctx.fillStyle = '#0ff';
  ctx.shadowBlur = 12; ctx.shadowColor = '#0ff';
  for (let i = -1; i <= 1; i += 2) {
    ctx.beginPath();
    ctx.moveTo(i * 10, h/2);
    ctx.lineTo(i * 6, h/2 + 16 + Math.random() * 8);
    ctx.lineTo(i * 14, h/2);
    ctx.fill();
  }

  // Ship body
  ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
  ctx.fillStyle = '#001a2a';
  ctx.beginPath();
  ctx.moveTo(0, -h/2);
  ctx.lineTo(-w/2, h/2);
  ctx.lineTo(-w/4, h/3);
  ctx.lineTo(0, h/2 - 8);
  ctx.lineTo(w/4, h/3);
  ctx.lineTo(w/2, h/2);
  ctx.closePath();
  ctx.fill();

  // Hull glow
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Cockpit
  const cockpitGrd = ctx.createRadialGradient(0, -h/6, 0, 0, -h/6, 10);
  cockpitGrd.addColorStop(0, '#0ff');
  cockpitGrd.addColorStop(1, '#0044');
  ctx.fillStyle = cockpitGrd;
  ctx.shadowBlur = 8; ctx.shadowColor = '#0ff';
  ctx.beginPath();
  ctx.ellipse(0, -h/6, 8, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing accent
  ctx.strokeStyle = '#f0f6';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-w/2, h/2); ctx.lineTo(-w/4, -h/6);
  ctx.moveTo(w/2, h/2); ctx.lineTo(w/4, -h/6);
  ctx.stroke();

  // Shield ring
  if (player.shield > 0) {
    const alpha = Math.min(1, player.shield / 60);
    ctx.strokeStyle = `rgba(0,255,255,${alpha * 0.7})`;
    ctx.lineWidth = 3;
    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  e.angle += 0.03;

  const s = e.size;
  const hp_ratio = e.hp / e.maxHp;

  ctx.shadowBlur = 12; ctx.shadowColor = e.color;

  if (e.type === 'grunt') {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(0, 20*s);
    ctx.lineTo(-18*s, -20*s);
    ctx.lineTo(-8*s, -10*s);
    ctx.lineTo(0, -15*s);
    ctx.lineTo(8*s, -10*s);
    ctx.lineTo(18*s, -20*s);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#fff4'; ctx.lineWidth = 1; ctx.stroke();
  } else if (e.type === 'heavy') {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + e.angle;
      const r = i % 2 === 0 ? 22*s : 14*s;
      ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#fff5'; ctx.lineWidth = 1.5; ctx.stroke();
    // Core
    ctx.fillStyle = '#fff8';
    ctx.beginPath(); ctx.arc(0, 0, 8*s, 0, Math.PI*2); ctx.fill();
  } else if (e.type === 'speeder') {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.moveTo(0, 12*s);
    ctx.lineTo(-14*s, -12*s);
    ctx.lineTo(0, -6*s);
    ctx.lineTo(14*s, -12*s);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'shooter') {
    ctx.rotate(e.angle);
    ctx.fillStyle = e.color;
    ctx.fillRect(-16*s, -16*s, 32*s, 32*s);
    ctx.strokeStyle = '#fff4'; ctx.lineWidth = 2; ctx.strokeRect(-16*s, -16*s, 32*s, 32*s);
    ctx.fillStyle = '#fff6';
    ctx.beginPath(); ctx.arc(0,0,8*s,0,Math.PI*2); ctx.fill();
  }

  // HP bar
  if (e.maxHp > 1) {
    const bw = e.w * 0.8;
    ctx.fillStyle = '#fff2';
    ctx.fillRect(-bw/2, -e.h/2 - 8, bw, 3);
    ctx.fillStyle = e.color;
    ctx.fillRect(-bw/2, -e.h/2 - 8, bw * hp_ratio, 3);
  }

  ctx.restore();
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);
  boss.angle += 0.02;

  const t = boss.phaseT;
  const s = 1 + Math.sin(t * 0.05) * 0.05;

  // Outer ring
  ctx.strokeStyle = `hsl(${(t*2)%360},100%,60%)`;
  ctx.lineWidth = 3;
  ctx.shadowBlur = 25; ctx.shadowColor = '#f0f';
  ctx.beginPath(); ctx.arc(0, 0, 55*s, 0, Math.PI*2); ctx.stroke();

  // Rotating spikes
  for (let i = 0; i < 8; i++) {
    const a = boss.angle + i * Math.PI/4;
    ctx.strokeStyle = '#f0f';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*40, Math.sin(a)*40);
    ctx.lineTo(Math.cos(a)*60, Math.sin(a)*60);
    ctx.stroke();
  }

  // Body
  ctx.fillStyle = '#1a0022';
  ctx.strokeStyle = '#f0f';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 20; ctx.shadowColor = '#f0f';
  ctx.beginPath();
  ctx.arc(0, 0, 42*s, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Inner core
  const phase_color = boss.phase === 0 ? '#f0f' : boss.phase === 1 ? '#f80' : '#f00';
  const grd = ctx.createRadialGradient(0,0,0,0,0,25);
  grd.addColorStop(0, phase_color);
  grd.addColorStop(1, '#0000');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0,0,25,0,Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
  const ex = Math.cos(boss.angle * 3) * 4;
  const ey = Math.sin(boss.angle * 3) * 4;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const grd = ctx.createLinearGradient(0, -b.h/2, 0, b.h/2);
  grd.addColorStop(0, '#fff');
  grd.addColorStop(0.3, '#0ff');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.shadowBlur = 8; ctx.shadowColor = '#0ff';
  ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
  ctx.restore();
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.fillStyle = '#f04';
  ctx.shadowBlur = 8; ctx.shadowColor = '#f04';
  ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPickup(p) {
  p.angle = (p.angle || 0) + 0.05;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  const colors = { power: '#ff0', health: '#0f8', shield: '#0ff', bomb: '#f80' };
  const emojis = { power: '⚡', health: '💊', shield: '🛡', bomb: '💣' };
  const c = colors[p.type];
  ctx.shadowBlur = 15; ctx.shadowColor = c;
  ctx.strokeStyle = c; ctx.lineWidth = 2;
  ctx.strokeRect(-12, -12, 24, 24);
  ctx.restore();
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emojis[p.type], 0, 0);
  ctx.restore();
}

function drawParticle(p) {
  if (p.type === 'text') {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.font = 'bold 14px Orbitron, monospace';
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.globalAlpha = p.life;
  ctx.fillStyle = p.color;
  ctx.shadowBlur = 6; ctx.shadowColor = p.color;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ─── COLLISION ────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

function circlesOverlap(ax, ay, ar, bx, by, br) {
  return Math.hypot(ax-bx, ay-by) < ar + br;
}

// ─── GAME LOGIC ───────────────────────────────────────────
function startGame() {
  score = 0; wave = 1; combo = 0; comboTimer = 0;
  player.x = W / 2; player.y = H - 100;
  player.hp = player.maxHp; player.invincible = 0;
  player.shield = 0; player.powerLevel = 1; player.powerTimer = 0;
  bullets = []; enemies = []; enemyBullets = []; particles = []; pickups = [];
  boss = null;
  autoFire = false; autoFireTimer = 0;
  document.getElementById('bossBar').style.display = 'none';
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('waveDisplay').textContent = '1';
  document.getElementById('healthFill').style.width = '100%';
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
  waveTimer = 60;
  initStars();
  spawnWave();
}

function gameOver() {
  state = 'dead';
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('ns_hi', highScore);
  }
  document.getElementById('finalScore').style.display = 'block';
  document.getElementById('finalScore').textContent = score.toLocaleString();
  document.getElementById('highScoreDisplay').style.display = 'block';
  document.getElementById('highScoreDisplay').textContent = `BEST: ${highScore.toLocaleString()}`;
  document.getElementById('startBtn').textContent = 'RETRY';
  document.getElementById('overlay').style.display = 'flex';
  spawnExplosion(player.x, player.y, '#0ff', 40);
}

// ─── UPDATE ───────────────────────────────────────────────
let lastTime = 0;
function update(dt) {
  if (state !== 'playing') return;

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
  });

  // Input
  let pdx = moveDir.x, pdy = moveDir.y;
  if (keys['ArrowLeft'] || keys['a']) pdx = -1;
  if (keys['ArrowRight'] || keys['d']) pdx = 1;
  if (keys['ArrowUp'] || keys['w']) pdy = -1;
  if (keys['ArrowDown'] || keys['s']) pdy = 1;

  const spd = 6;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x + pdx * spd));
  player.y = Math.max(player.h/2 + 60, Math.min(H - player.h/2 - 80, player.y + pdy * spd));

  // Auto-fire
  const isFiring = firing || keys[' '] || keys['z'];
  if (isFiring) {
    autoFireTimer++;
    if (autoFireTimer % (player.powerLevel >= 3 ? 8 : 12) === 0) fireBullet();
  } else {
    autoFireTimer = 0;
  }

  // Power decay
  if (player.powerTimer > 0) {
    player.powerTimer--;
    if (player.powerTimer === 0 && player.powerLevel > 1) player.powerLevel--;
  }

  // Invincibility
  if (player.invincible > 0) player.invincible--;
  if (player.shield > 0) player.shield--;

  // Combo decay
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) combo = 0;
    document.getElementById('combo-display').style.opacity = comboTimer > 0 ? '1' : '0';
  }

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.y > -20 && b.x > -20 && b.x < W+20;
  });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.y > H+20 || b.x < -20 || b.x > W+20) return false;
    // Hit player
    if (player.invincible === 0 && circlesOverlap(b.x, b.y, 5, player.x, player.y, 14)) {
      if (player.shield > 0) {
        player.shield = 0;
        spawnHitParticles(player.x, player.y);
      } else {
        player.hp--;
        player.invincible = 90;
        spawnHitParticles(player.x, player.y);
        updateHPBar();
        if (player.hp <= 0) gameOver();
      }
      return false;
    }
    return true;
  });

  // Enemies
  enemies.forEach(e => {
    e.patternT++;
    const t = e.patternT;

    // Movement patterns
    if (e.pattern === 0) { // Straight down
      e.y += e.speed;
      e.x += Math.sin(t * 0.03) * 1.5;
    } else if (e.pattern === 1) { // Dive at player
      if (e.y < 120) e.y += e.speed;
      else {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.hypot(dx, dy);
        e.x += (dx/d) * e.speed * 1.2;
        e.y += (dy/d) * e.speed * 0.8;
      }
    } else { // Zigzag
      e.y += e.speed * 0.8;
      e.x += Math.sin(t * 0.06) * 3;
    }

    // Shooting
    if (e.type === 'shooter' && e.y > 0) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = 80 - wave * 3;
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const d = Math.hypot(dx, dy);
        const spd2 = 4 + wave * 0.2;
        enemyBullets.push({ x: e.x, y: e.y, vx: dx/d*spd2, vy: dy/d*spd2 });
      }
    }

    // Bullet collision
    bullets = bullets.filter(b => {
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w*0.7, e.h*0.7)) {
        e.hp -= b.power || 1;
        spawnHitParticles(b.x, b.y);
        return false;
      }
      return true;
    });

    // Player collision
    if (player.invincible === 0 && rectsOverlap(player.x, player.y, player.w*0.6, player.h*0.6, e.x, e.y, e.w*0.5, e.h*0.5)) {
      if (player.shield > 0) {
        e.hp = 0; player.shield = 0;
        spawnExplosion(e.x, e.y, e.color);
      } else {
        player.hp = Math.max(0, player.hp - 1);
        player.invincible = 90;
        spawnHitParticles(player.x, player.y);
        updateHPBar();
        if (player.hp <= 0) { gameOver(); return; }
      }
    }
  });

  // Remove dead enemies
  enemies = enemies.filter(e => {
    if (e.hp <= 0 || e.y > H + 80) {
      if (e.hp <= 0) {
        combo++;
        comboTimer = 90;
        const mult = Math.min(combo, 8);
        const pts = e.score * mult;
        score += pts;
        document.getElementById('scoreDisplay').textContent = score.toLocaleString();
        spawnExplosion(e.x, e.y, e.color, 20);
        maybeSpawnPickup(e.x, e.y);
        if (combo >= 3) {
          document.getElementById('combo-display').textContent = `×${combo} COMBO!`;
          document.getElementById('combo-display').style.opacity = '1';
        }
        spawnScoreFloat(e.x, e.y, mult > 1 ? `+${pts} ×${mult}` : `+${pts}`);
      }
      return false;
    }
    return true;
  });

  // Boss logic
  if (boss) {
    boss.phaseT++;
    const t = boss.phaseT;

    if (boss.entering) {
      boss.y = Math.min(boss.targetY, boss.y + 2);
      if (boss.y >= boss.targetY) boss.entering = false;
    } else {
      // Movement phases
      if (boss.phase === 0) {
        boss.x = W/2 + Math.sin(t * 0.02) * (W * 0.3);
      } else if (boss.phase === 1) {
        boss.x = W/2 + Math.sin(t * 0.04) * (W * 0.35);
        boss.y = boss.targetY + Math.sin(t * 0.03) * 40;
      } else {
        boss.x = W/2 + Math.sin(t * 0.06) * (W * 0.38);
        boss.y = boss.targetY + Math.sin(t * 0.05) * 60;
      }

      // Shooting
      boss.shootTimer--;
      const shootRate = Math.max(15, 40 - boss.phase * 10 - wave);
      if (boss.shootTimer <= 0) {
        boss.shootTimer = shootRate;
        if (boss.phase === 0) {
          // Single aimed shot
          const dx = player.x - boss.x;
          const dy = player.y - boss.y;
          const d = Math.hypot(dx, dy);
          const spd2 = 5;
          enemyBullets.push({ x: boss.x, y: boss.y, vx: dx/d*spd2, vy: dy/d*spd2 });
        } else if (boss.phase === 1) {
          // Spread
          for (let i = -2; i <= 2; i++) {
            const a = Math.PI/2 + i * 0.25;
            enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a)*5, vy: Math.sin(a)*5 });
          }
        } else {
          // Ring burst
          for (let i = 0; i < 8; i++) {
            const a = i * Math.PI/4 + t * 0.1;
            enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a)*4, vy: Math.sin(a)*4 });
          }
        }
      }
    }

    // Boss bullet hits
    bullets = bullets.filter(b => {
      if (rectsOverlap(b.x, b.y, b.w, b.h, boss.x, boss.y, 80, 80)) {
        boss.hp -= b.power || 1;
        spawnHitParticles(b.x, b.y);
        updateBossBar();

        // Phase transitions
        const pct = boss.hp / boss.maxHp;
        if (pct < 0.33 && boss.phase < 2) boss.phase = 2;
        else if (pct < 0.66 && boss.phase < 1) boss.phase = 1;

        if (boss.hp <= 0) {
          spawnExplosion(boss.x, boss.y, '#f0f', 60);
          score += (500 + wave * 100);
          document.getElementById('scoreDisplay').textContent = score.toLocaleString();
          document.getElementById('bossBar').style.display = 'none';
          maybeSpawnPickup(boss.x, boss.y);
          maybeSpawnPickup(boss.x + 30, boss.y);
          boss = null;
          return false;
        }
        return false;
      }
      return true;
    });

    // Boss body collision
    if (boss && player.invincible === 0 && circlesOverlap(player.x, player.y, 14, boss.x, boss.y, 42)) {
      if (player.shield > 0) player.shield = 0;
      else { player.hp = Math.max(0, player.hp - 1); player.invincible = 90; updateHPBar(); }
      if (player.hp <= 0) gameOver();
    }
  }

  // Pickups
  pickups = pickups.filter(p => {
    p.y += p.vy;
    p.life--;
    if (p.life <= 0 || p.y > H + 20) return false;
    if (circlesOverlap(p.x, p.y, 14, player.x, player.y, 20)) {
      applyPickup(p.type);
      return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx || 0;
    p.y += p.vy || 0;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Wave progression
  if (enemies.length === 0 && !boss) {
    waveTimer--;
    if (waveTimer <= 0) {
      wave++;
      document.getElementById('waveDisplay').textContent = wave;
      waveTimer = 90;
      spawnWave();
    }
  }
}

function applyPickup(type) {
  spawnExplosion(player.x, player.y - 20, '#ff0', 10);
  if (type === 'power') {
    player.powerLevel = Math.min(3, player.powerLevel + 1);
    player.powerTimer = 600;
    spawnScoreFloat(player.x, player.y, '⚡ POWER UP!');
  } else if (type === 'health') {
    player.hp = Math.min(player.maxHp, player.hp + 1);
    updateHPBar();
    spawnScoreFloat(player.x, player.y, '💊 +HP');
  } else if (type === 'shield') {
    player.shield = 180;
    spawnScoreFloat(player.x, player.y, '🛡 SHIELD');
  } else if (type === 'bomb') {
    enemies.forEach(e => {
      score += e.score;
      spawnExplosion(e.x, e.y, e.color, 20);
    });
    if (boss) {
      boss.hp = Math.max(1, boss.hp - 15);
      spawnExplosion(boss.x, boss.y, '#f0f', 30);
      updateBossBar();
    }
    enemies = [];
    document.getElementById('scoreDisplay').textContent = score.toLocaleString();
    spawnScoreFloat(player.x, player.y, '💣 BOMB!');
  }
}

function updateHPBar() {
  document.getElementById('healthFill').style.width = (player.hp / player.maxHp * 100) + '%';
}

// ─── DRAW ─────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);

  // Scanlines subtle
  ctx.fillStyle = 'rgba(0,255,255,0.015)';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);

  // Stars
  stars.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = s.color;
    ctx.shadowBlur = s.r > 1 ? 4 : 0;
    ctx.shadowColor = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // Grid lines (horizon effect)
  ctx.save();
  ctx.strokeStyle = '#0ff06';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.restore();

  if (state === 'playing') {
    pickups.forEach(drawPickup);
    bullets.forEach(drawBullet);
    enemyBullets.forEach(drawEnemyBullet);
    enemies.forEach(drawEnemy);
    if (boss) drawBoss();
    drawPlayer();
    particles.forEach(drawParticle);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── START BUTTON ─────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('startBtn').addEventListener('touchend', e => { e.preventDefault(); startGame(); }, {passive: false});

initStars();
requestAnimationFrame(loop);
</script>
</body>
