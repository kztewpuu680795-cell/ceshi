<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STARBLAZE // 星焰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Orbitron',monospace;}
  canvas{display:block;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
  #ui{position:absolute;top:0;left:50%;transform:translateX(-50%);width:var(--cw,375px);pointer-events:none;z-index:10;}
  #hud{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;gap:12px;}
  .hud-left,.hud-right{display:flex;flex-direction:column;gap:6px;}
  .hud-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .score-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 20px #00ffff,0 0 40px #00ffff;letter-spacing:2px;}
  .score-label{font-family:'Rajdhani',sans-serif;font-size:10px;color:#00ffff88;letter-spacing:4px;text-transform:uppercase;}
  .hp-bar-wrap{width:110px;height:8px;background:#ffffff15;border-radius:4px;overflow:hidden;border:1px solid #ff006655;}
  .hp-bar{height:100%;background:linear-gradient(90deg,#ff0066,#ff6600);border-radius:4px;transition:width 0.2s;box-shadow:0 0 8px #ff0066;}
  .shield-bar-wrap{width:110px;height:8px;background:#ffffff15;border-radius:4px;overflow:hidden;border:1px solid #00ffff55;}
  .shield-bar{height:100%;background:linear-gradient(90deg,#0066ff,#00ffff);border-radius:4px;transition:width 0.2s;box-shadow:0 0 8px #00ffff;}
  .bar-label{font-family:'Rajdhani',sans-serif;font-size:9px;color:#ffffff66;letter-spacing:3px;margin-bottom:2px;}
  .lives{display:flex;gap:4px;align-items:center;}
  .life-icon{width:16px;height:16px;filter:drop-shadow(0 0 4px #00ffff);}
  .level-badge{font-family:'Orbitron',monospace;font-size:11px;color:#ffcc00;text-shadow:0 0 10px #ffcc00;letter-spacing:1px;}
  .boss-wrap{padding:0 16px 8px;display:none;}
  .boss-label{font-family:'Rajdhani',sans-serif;font-size:10px;color:#ff006699;letter-spacing:6px;margin-bottom:4px;text-align:center;animation:pulse 1s infinite;}
  .boss-hp-wrap{height:10px;background:#ffffff10;border-radius:5px;border:1px solid #ff006688;overflow:hidden;}
  .boss-hp{height:100%;background:linear-gradient(90deg,#ff0000,#ff6600,#ffff00);transition:width 0.1s;box-shadow:0 0 12px #ff0066;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
  #overlay{position:absolute;top:0;left:50%;transform:translateX(-50%);width:var(--cw,375px);height:var(--ch,812px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:all;}
  .title-wrap{text-align:center;margin-bottom:40px;}
  .title-main{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;background:linear-gradient(135deg,#00ffff,#0066ff,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;letter-spacing:4px;line-height:1;}
  .title-sub{font-family:'Rajdhani',sans-serif;font-size:13px;color:#00ffff88;letter-spacing:12px;margin-top:6px;}
  .title-deco{font-family:'Rajdhani',sans-serif;font-size:10px;color:#ffffff33;letter-spacing:3px;margin-top:16px;}
  .start-btn{background:transparent;border:2px solid #00ffff;color:#00ffff;font-family:'Orbitron',monospace;font-size:15px;letter-spacing:4px;padding:16px 40px;cursor:pointer;position:relative;overflow:hidden;pointer-events:all;text-transform:uppercase;transition:all 0.3s;}
  .start-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#00ffff22,transparent);transform:translateX(-100%);transition:transform 0.3s;}
  .start-btn:hover::before,.start-btn:active::before{transform:translateX(0);}
  .start-btn:hover,.start-btn:active{box-shadow:0 0 30px #00ffff66,inset 0 0 20px #00ffff22;color:#fff;}
  .hint{font-family:'Rajdhani',sans-serif;font-size:12px;color:#ffffff44;letter-spacing:3px;margin-top:24px;animation:pulse 2s infinite;}
  .gameover-title{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#ff0066;text-shadow:0 0 20px #ff0066,0 0 60px #ff006655;letter-spacing:6px;margin-bottom:16px;}
  .final-score{font-family:'Orbitron',monospace;font-size:28px;color:#ffcc00;text-shadow:0 0 20px #ffcc00;margin-bottom:8px;}
  .high-score{font-family:'Rajdhani',sans-serif;font-size:14px;color:#00ffff88;letter-spacing:3px;margin-bottom:40px;}
  .corner-tl,.corner-tr,.corner-bl,.corner-br{position:absolute;width:20px;height:20px;border-color:#00ffff44;}
  .corner-tl{top:20px;left:20px;border-top:1px solid;border-left:1px solid;}
  .corner-tr{top:20px;right:20px;border-top:1px solid;border-right:1px solid;}
  .corner-bl{bottom:20px;left:20px;border-bottom:1px solid;border-left:1px solid;}
  .corner-br{bottom:20px;right:20px;border-bottom:1px solid;border-right:1px solid;}
  #power-notif{position:absolute;left:50%;transform:translateX(-50%);top:100px;z-index:30;pointer-events:none;opacity:0;transition:opacity 0.3s;font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:4px;text-transform:uppercase;}
  #wave-notif{position:absolute;left:50%;transform:translateX(-50%);top:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;opacity:0;text-align:center;}
  .wave-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#fff;text-shadow:0 0 30px #00ffff;letter-spacing:6px;}
  .wave-sub{font-family:'Rajdhani',sans-serif;font-size:12px;color:#00ffff88;letter-spacing:8px;margin-top:4px;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="game"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-left">
      <div class="bar-label">SHIELD</div>
      <div class="shield-bar-wrap"><div class="shield-bar" id="shieldBar"></div></div>
      <div class="bar-label" style="margin-top:4px;">HULL</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="hpBar"></div></div>
    </div>
    <div class="hud-center">
      <div class="score-label">SCORE</div>
      <div class="score-val" id="scoreVal">000000</div>
      <div class="level-badge" id="levelBadge">SECTOR 1</div>
    </div>
    <div class="hud-right" style="align-items:flex-end;">
      <div class="bar-label">LIVES</div>
      <div class="lives" id="livesDisplay"></div>
      <div class="bar-label" id="powerLabel" style="color:#ffcc00;margin-top:4px;display:none;">POWER UP</div>
    </div>
  </div>
  <div class="boss-wrap" id="bossWrap">
    <div class="boss-label">⚠ BOSS INCOMING ⚠</div>
    <div class="boss-hp-wrap"><div class="boss-hp" id="bossHp"></div></div>
  </div>
</div>
<div id="power-notif" id="powerNotif"></div>
<div id="wave-notif" id="waveNotif">
  <div class="wave-title" id="waveTitle"></div>
  <div class="wave-sub" id="waveSub"></div>
</div>
<div id="overlay">
  <div class="corner-tl"></div><div class="corner-tr"></div>
  <div class="corner-bl"></div><div class="corner-br"></div>
  <div class="title-wrap">
    <div class="title-main">STARBLAZE</div>
    <div class="title-sub">星　焰</div>
    <div class="title-deco">// TACTICAL SPACE DEFENSE SYSTEM //</div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()">LAUNCH</button>
  <div class="hint" id="hintText">触摸屏幕移动飞船 · 自动射击</div>
</div>

<script>
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const hintText = document.getElementById('hintText');

let CW, CH;
function resize(){
  CW = Math.min(window.innerWidth, 430);
  CH = window.innerHeight;
  canvas.width = bgCanvas.width = CW;
  canvas.height = bgCanvas.height = CH;
  document.documentElement.style.setProperty('--cw', CW+'px');
  document.documentElement.style.setProperty('--ch', CH+'px');
  document.getElementById('ui').style.width = CW+'px';
  const ov = document.getElementById('overlay');
  ov.style.height = CH+'px';
}
resize();
window.addEventListener('resize', resize);

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let state = 'menu'; // menu | playing | gameover | boss
let score = 0, highScore = 0, lives = 3, wave = 0;
let playerHP = 100, playerShield = 100, shieldRegen = 0;
let powerUpType = null, powerUpTimer = 0;
let frameCount = 0, spawnTimer = 0, bossSpawned = false;
let bossHP = 0, bossMaxHP = 0;
let gameRunning = false;
let touchX = null, touchY = null;
let waveNotifTimer = 0;

// ─── ENTITIES ────────────────────────────────────────────────────────────────
let player, bullets, enemies, enemyBullets, particles, powerUps, stars, nebulas;

// ─── STARS BACKGROUND ────────────────────────────────────────────────────────
function initStars(){
  stars = [];
  nebulas = [];
  for(let i=0;i<200;i++){
    stars.push({
      x:Math.random()*CW, y:Math.random()*CH,
      r:Math.random()*1.5+0.2,
      speed:Math.random()*1.5+0.3,
      alpha:Math.random()*0.7+0.3,
      color:['#ffffff','#aaddff','#ffaadd','#aaffcc'][Math.floor(Math.random()*4)]
    });
  }
  for(let i=0;i<4;i++){
    nebulas.push({
      x:Math.random()*CW, y:Math.random()*CH,
      r:80+Math.random()*120,
      color:['#0033ff','#660099','#003366','#006633'][i],
      alpha:0.08+Math.random()*0.06
    });
  }
}

function drawBg(){
  bgCtx.fillStyle='#000008';
  bgCtx.fillRect(0,0,CW,CH);
  // Nebulas
  nebulas.forEach(n=>{
    const g=bgCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.color+'88');
    g.addColorStop(1,'transparent');
    bgCtx.fillStyle=g;
    bgCtx.beginPath();bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);bgCtx.fill();
  });
  // Stars
  stars.forEach(s=>{
    if(gameRunning){
      s.y += s.speed;
      if(s.y>CH){s.y=0;s.x=Math.random()*CW;}
    }
    bgCtx.globalAlpha = s.alpha * (0.7+0.3*Math.sin(frameCount*0.02+s.x));
    bgCtx.fillStyle=s.color;
    bgCtx.beginPath();bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);bgCtx.fill();
  });
  bgCtx.globalAlpha=1;
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
function createPlayer(){
  return {
    x:CW/2, y:CH-120,
    w:44, h:54,
    fireTimer:0, fireRate:8,
    trailParticles:[],
    invincible:0
  };
}

function drawPlayer(p){
  if(p.invincible>0 && Math.floor(frameCount/4)%2===0) return;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Engine glow
  const eg=ctx.createRadialGradient(0,22,0,0,22,30);
  eg.addColorStop(0,'#00ffff66');
  eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg;
  ctx.fillRect(-30,10,60,40);

  // Engine flames
  const ft=frameCount*0.15;
  [-14,0,14].forEach((ox,i)=>{
    const fh=18+Math.sin(ft+i*1.2)*6;
    const fg=ctx.createLinearGradient(ox,20,ox,20+fh);
    fg.addColorStop(0,'#00ffff');
    fg.addColorStop(0.5,'#0066ff');
    fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(ox-5,20);
    ctx.lineTo(ox+5,20);
    ctx.lineTo(ox+2,20+fh);
    ctx.lineTo(ox-2,20+fh);
    ctx.fill();
  });

  // Ship body
  const sg=ctx.createLinearGradient(-22,-26,22,26);
  sg.addColorStop(0,'#88ddff');
  sg.addColorStop(0.4,'#0099cc');
  sg.addColorStop(1,'#003366');
  ctx.fillStyle=sg;
  // Main hull
  ctx.beginPath();
  ctx.moveTo(0,-26);
  ctx.lineTo(14,8);
  ctx.lineTo(22,20);
  ctx.lineTo(14,16);
  ctx.lineTo(0,20);
  ctx.lineTo(-14,16);
  ctx.lineTo(-22,20);
  ctx.lineTo(-14,8);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle='#005599';
  ctx.beginPath();ctx.moveTo(-14,8);ctx.lineTo(-28,-2);ctx.lineTo(-22,20);ctx.fill();
  ctx.beginPath();ctx.moveTo(14,8);ctx.lineTo(28,-2);ctx.lineTo(22,20);ctx.fill();

  // Cockpit
  const cg=ctx.createRadialGradient(0,-8,0,0,-8,12);
  cg.addColorStop(0,'#aaffff');
  cg.addColorStop(1,'#0055aa');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.ellipse(0,-8,8,12,0,0,Math.PI*2);ctx.fill();

  // Glow outline
  ctx.strokeStyle='#00ffff44';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(0,-26);ctx.lineTo(14,8);ctx.lineTo(22,20);
  ctx.lineTo(14,16);ctx.lineTo(0,20);ctx.lineTo(-14,16);
  ctx.lineTo(-22,20);ctx.lineTo(-14,8);ctx.closePath();
  ctx.stroke();

  // Shield ring if active
  if(playerShield>0){
    ctx.globalAlpha=playerShield/200;
    const sr=ctx.createRadialGradient(0,0,20,0,0,36);
    sr.addColorStop(0,'transparent');
    sr.addColorStop(0.8,'#00ffff22');
    sr.addColorStop(1,'#00ffff66');
    ctx.fillStyle=sr;
    ctx.beginPath();ctx.arc(0,0,36,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
function fireBullet(p){
  const type = powerUpType;
  if(type==='spread'){
    [-20,-10,0,10,20].forEach(angle=>{
      const rad=angle*Math.PI/180;
      bullets.push({x:p.x,y:p.y-20,vx:Math.sin(rad)*6,vy:-14,type:'spread',w:3,h:10});
    });
  } else if(type==='laser'){
    bullets.push({x:p.x,y:p.y-20,vx:0,vy:-22,type:'laser',w:5,h:20});
  } else if(type==='triple'){
    [-15,0,15].forEach(angle=>{
      const rad=angle*Math.PI/180;
      bullets.push({x:p.x,y:p.y-20,vx:Math.sin(rad)*5,vy:-16,type:'triple',w:4,h:12});
    });
  } else {
    bullets.push({x:p.x,y:p.y-20,vx:0,vy:-18,type:'normal',w:4,h:14});
  }
}

function drawBullet(b){
  ctx.save();
  if(b.type==='laser'){
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y-40);
    g.addColorStop(0,'#ffff00');
    g.addColorStop(0.5,'#ffffff');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.shadowColor='#ffff00';
    ctx.shadowBlur=15;
    ctx.fillRect(b.x-b.w/2,b.y-b.h,b.w,b.h+30);
  } else if(b.type==='spread'){
    ctx.shadowColor='#ff6600';
    ctx.shadowBlur=12;
    const g=ctx.createLinearGradient(b.x,b.y,b.x+b.vx*3,b.y-b.h);
    g.addColorStop(0,'#ff6600');
    g.addColorStop(1,'#ffff00');
    ctx.fillStyle=g;
    ctx.save();ctx.translate(b.x,b.y);
    ctx.rotate(Math.atan2(b.vx,-b.vy));
    ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
    ctx.restore();
  } else {
    ctx.shadowColor='#00ffff';
    ctx.shadowBlur=14;
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y-b.h);
    g.addColorStop(0,'#00ffff');
    g.addColorStop(1,'#ffffff');
    ctx.fillStyle=g;
    ctx.fillRect(b.x-b.w/2,b.y-b.h,b.w,b.h);
    // Core
    ctx.fillStyle='#ffffff';
    ctx.fillRect(b.x-1,b.y-b.h+2,2,b.h-4);
  }
  ctx.restore();
}

// ─── ENEMIES ─────────────────────────────────────────────────────────────────
const ENEMY_TYPES = {
  scout:{hp:2,pts:100,color:'#ff3366',w:28,h:24,speed:2.5,fireRate:0,pattern:'straight'},
  fighter:{hp:4,pts:200,color:'#ff6600',w:34,h:28,speed:1.8,fireRate:90,pattern:'sine'},
  heavy:{hp:10,pts:400,color:'#cc00ff',w:42,h:36,speed:1.2,fireRate:60,pattern:'straight'},
  drone:{hp:1,pts:50,color:'#00ff99',w:20,h:20,speed:3.5,fireRate:0,pattern:'zigzag'},
};

function createEnemy(type, x, y, data={}){
  const t=ENEMY_TYPES[type];
  return{
    type, x:x||CW/2, y:y||(-40),
    hp:t.hp, maxHp:t.hp, pts:t.pts,
    color:t.color, w:t.w, h:t.h,
    speed:t.speed*(1+wave*0.08),
    fireTimer:Math.random()*t.fireRate,
    fireRate:t.fireRate,
    pattern:t.pattern,
    angle:0, startX:x||CW/2,
    vx:data.vx||0, vy:data.vy||0,
    entryDone:false, entryY:80+Math.random()*60,
    deathEffect:false
  };
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);

  const flash = e.flashTimer>0 ? 1 : 0;

  if(e.type==='scout'){
    const g=ctx.createLinearGradient(0,-e.h/2,0,e.h/2);
    g.addColorStop(0,flash?'#fff':e.color);
    g.addColorStop(1,'#330011');
    ctx.fillStyle=g;
    ctx.shadowColor=e.color;
    ctx.shadowBlur=12;
    // Triangle ship (pointing down)
    ctx.beginPath();
    ctx.moveTo(0,e.h/2);ctx.lineTo(-e.w/2,-e.h/2);ctx.lineTo(e.w/2,-e.h/2);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=e.color;ctx.lineWidth=1;ctx.stroke();
  } else if(e.type==='fighter'){
    const g=ctx.createLinearGradient(0,-e.h/2,0,e.h/2);
    g.addColorStop(0,flash?'#fff':e.color);
    g.addColorStop(1,'#331100');
    ctx.fillStyle=g;
    ctx.shadowColor=e.color;ctx.shadowBlur=15;
    ctx.beginPath();
    ctx.moveTo(0,e.h/2);
    ctx.lineTo(-e.w/2,0);ctx.lineTo(-e.w/3,-e.h/2);
    ctx.lineTo(0,-e.h/3);ctx.lineTo(e.w/3,-e.h/2);
    ctx.lineTo(e.w/2,0);ctx.closePath();ctx.fill();ctx.stroke();
    // Center glow
    ctx.fillStyle=flash?'#fff':'#ffaa00';
    ctx.beginPath();ctx.arc(0,-2,5,0,Math.PI*2);ctx.fill();
  } else if(e.type==='heavy'){
    ctx.shadowColor=e.color;ctx.shadowBlur=20;
    const g=ctx.createRadialGradient(0,0,0,0,0,e.w/2);
    g.addColorStop(0,flash?'#fff':'#aa44ff');
    g.addColorStop(1,'#1a0033');
    ctx.fillStyle=g;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2-Math.PI/2;
      const r=i%2===0?e.w/2:e.w/3;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.stroke();
    // HP bar
    const bw=e.w;
    ctx.fillStyle='#33003355';ctx.fillRect(-bw/2,e.h/2+4,bw,4);
    ctx.fillStyle=e.color;ctx.fillRect(-bw/2,e.h/2+4,bw*(e.hp/e.maxHp),4);
  } else if(e.type==='drone'){
    ctx.shadowColor=e.color;ctx.shadowBlur=10;
    ctx.strokeStyle=flash?'#fff':e.color;ctx.lineWidth=2;
    ctx.fillStyle=e.color+'44';
    ctx.beginPath();ctx.arc(0,0,e.w/2,0,Math.PI*2);
    ctx.fill();ctx.stroke();
    // Inner cross
    ctx.strokeStyle=flash?'#fff':e.color;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-e.w/3,0);ctx.lineTo(e.w/3,0);ctx.moveTo(0,-e.w/3);ctx.lineTo(0,e.w/3);ctx.stroke();
  }
  if(e.flashTimer>0) e.flashTimer--;
  ctx.restore();
}

// ─── BOSS ─────────────────────────────────────────────────────────────────────
let boss = null;
function createBoss(){
  bossMaxHP = 80 + wave*30;
  bossHP = bossMaxHP;
  return {
    x:CW/2, y:-100,
    targetY:120, phase:0,
    fireTimer:0, sweepAngle:0,
    hp:bossHP, maxHp:bossMaxHP,
    moveTimer:0, dx:0,
    entryDone:false
  };
}

function drawBoss(b){
  if(!b) return;
  ctx.save();
  ctx.translate(b.x,b.y);
  const t=frameCount*0.03;
  const flash=b.flashTimer>0;

  // Outer ring
  ctx.strokeStyle=flash?'#fff':'#ff0066';
  ctx.lineWidth=3;
  ctx.shadowColor='#ff0066';
  ctx.shadowBlur=25;
  ctx.beginPath();ctx.arc(0,0,64,0,Math.PI*2);ctx.stroke();

  // Rotating rings
  for(let r=0;r<3;r++){
    ctx.save();
    ctx.rotate(t*(r%2===0?1:-1)*(r+1)*0.5);
    ctx.strokeStyle=(flash?'#fff':['#ff0066','#ff6600','#ffcc00'][r])+'aa';
    ctx.lineWidth=1.5;
    ctx.setLineDash([8,8]);
    ctx.beginPath();ctx.arc(0,0,48-r*6,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Core body
  const bg=ctx.createRadialGradient(0,0,0,0,0,50);
  bg.addColorStop(0,flash?'#ffffff':'#ff3300');
  bg.addColorStop(0.4,flash?'#ffaaaa':'#990000');
  bg.addColorStop(1,'#110000');
  ctx.fillStyle=bg;
  ctx.shadowBlur=30;
  ctx.beginPath();
  // Skull-like hexagon
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2+t*0.2;
    const r=i%2===0?52:38;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();

  // Eye
  const eg=ctx.createRadialGradient(0,0,0,0,0,20);
  eg.addColorStop(0,'#ffffff');
  eg.addColorStop(0.3,'#ff6600');
  eg.addColorStop(1,'#ff000000');
  ctx.fillStyle=eg;
  ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();

  // Turrets
  [[-38,-10],[38,-10],[0,-40]].forEach(([tx,ty])=>{
    ctx.fillStyle=flash?'#fff':'#cc2200';
    ctx.shadowColor='#ff4400';
    ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(tx,ty,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ff6600';ctx.lineWidth=2;ctx.stroke();
  });

  if(b.flashTimer>0) b.flashTimer--;
  ctx.restore();
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function spawnExplosion(x,y,color,count=20,size=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const speed=Math.random()*4+1;
    particles.push({
      x,y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
      life:1, decay:0.025+Math.random()*0.03,
      r:size*Math.random()+1,
      color, type:'spark'
    });
  }
  // Shockwave
  particles.push({x,y,r:5,maxR:60,life:1,color,type:'ring',decay:0.04});
}

function spawnTrail(x,y){
  particles.push({
    x:x+(Math.random()-0.5)*8,
    y:y+20,
    vx:(Math.random()-0.5)*0.5,
    vy:Math.random()*1.5+0.5,
    life:0.6, decay:0.05,
    r:Math.random()*3+1,
    color:['#00ffff','#0066ff','#ffffff'][Math.floor(Math.random()*3)],
    type:'trail'
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='ring'){
      p.r += (p.maxR-p.r)*0.15;
      ctx.strokeStyle=p.color;
      ctx.lineWidth=2*(1-p.life);
      ctx.shadowColor=p.color;
      ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    } else {
      ctx.fillStyle=p.color;
      ctx.shadowColor=p.color;
      ctx.shadowBlur=p.life*15;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    p.x+=p.vx||0;p.y+=p.vy||0;
    p.life-=p.decay;
    if(p.vx)p.vx*=0.96;if(p.vy&&p.type!=='trail')p.vy*=0.96;
  });
  particles=particles.filter(p=>p.life>0);
}

// ─── POWER-UPS ───────────────────────────────────────────────────────────────
const POWERUP_TYPES=[
  {type:'spread',color:'#ff6600',label:'SPREAD SHOT',icon:'◈'},
  {type:'laser',color:'#ffff00',label:'LASER BEAM',icon:'⚡'},
  {type:'triple',color:'#00ff99',label:'TRIPLE SHOT',icon:'⟩⟩⟩'},
  {type:'shield',color:'#00ffff',label:'SHIELD RESTORE',icon:'◉'},
  {type:'hp',color:'#ff3366',label:'HULL REPAIR',icon:'✚'},
];

function drawPowerUp(pu){
  ctx.save();
  ctx.translate(pu.x,pu.y);
  const t=frameCount*0.05;
  ctx.rotate(Math.sin(t)*0.1);
  const g=ctx.createRadialGradient(0,0,0,0,0,16);
  g.addColorStop(0,pu.color+'ff');
  g.addColorStop(1,pu.color+'00');
  ctx.fillStyle=g;
  ctx.shadowColor=pu.color;
  ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=pu.color;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#ffffff';
  ctx.font='bold 14px Orbitron';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowBlur=0;
  ctx.fillText(pu.icon,0,0);
  ctx.restore();
  pu.y+=1.5;
}

// ─── ENEMY BULLETS ───────────────────────────────────────────────────────────
function drawEnemyBullet(b){
  ctx.save();
  ctx.shadowColor=b.color||'#ff3366';
  ctx.shadowBlur=10;
  ctx.fillStyle=b.color||'#ff3366';
  ctx.beginPath();ctx.arc(b.x,b.y,b.r||4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.arc(b.x,b.y,(b.r||4)*0.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  b.x+=b.vx;b.y+=b.vy;
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax-aw/2<bx+bw/2&&ax+aw/2>bx-bw/2&&ay-ah/2<by+bh/2&&ay+ah/2>by-bh/2;
}
function circleOverlap(ax,ay,ar,bx,by,br){
  const dx=ax-bx,dy=ay-by;
  return Math.sqrt(dx*dx+dy*dy)<ar+br;
}

// ─── ENEMY AI ─────────────────────────────────────────────────────────────────
function updateEnemy(e){
  e.angle = (e.angle||0) + 0.05;
  if(!e.entryDone){
    e.y += 3;
    if(e.y >= e.entryY) e.entryDone=true;
    return;
  }
  if(e.pattern==='sine'){
    e.x = e.startX + Math.sin(e.angle)*80;
    e.y += e.speed*0.6;
  } else if(e.pattern==='zigzag'){
    e.x += e.vx;
    e.y += e.speed;
    if(e.x<e.w||e.x>CW-e.w) e.vx*=-1;
  } else {
    e.y += e.speed;
  }
  // Enemy shooting
  if(e.fireRate>0){
    e.fireTimer++;
    if(e.fireTimer>=e.fireRate){
      e.fireTimer=0;
      const dx=player.x-e.x, dy=player.y-e.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const spd=3.5+wave*0.2;
      enemyBullets.push({x:e.x,y:e.y,vx:dx/dist*spd,vy:dy/dist*spd,r:4,color:'#ff3366'});
    }
  }
}

// ─── BOSS AI ──────────────────────────────────────────────────────────────────
function updateBoss(b){
  if(!b.entryDone){
    b.y = Math.min(b.y+3, b.targetY);
    if(b.y>=b.targetY) b.entryDone=true;
    return;
  }
  b.moveTimer++;
  if(b.moveTimer>80){
    b.moveTimer=0;
    b.dx=(Math.random()-0.5)*4;
  }
  b.x+=b.dx;
  b.x=Math.max(80,Math.min(CW-80,b.x));
  b.y=b.targetY+Math.sin(frameCount*0.02)*20;

  // Boss shooting patterns
  b.fireTimer++;
  b.phase = Math.floor(b.hp/b.maxHp*3); // 0=low, 1=mid, 2=high
  const rate = b.phase===0?20:b.phase===1?30:50;
  if(b.fireTimer>=rate){
    b.fireTimer=0;
    b.sweepAngle+=0.3;
    if(b.phase===2){
      // Single aimed
      const dx=player.x-b.x,dy=player.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      enemyBullets.push({x:b.x,y:b.y,vx:dx/d*5,vy:dy/d*5,r:6,color:'#ff6600'});
    } else if(b.phase===1){
      // Spread
      for(let i=0;i<5;i++){
        const a=b.sweepAngle+i/5*Math.PI*2;
        enemyBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,r:5,color:'#cc00ff'});
      }
    } else {
      // Dense spread + aimed
      for(let i=0;i<8;i++){
        const a=b.sweepAngle+i/8*Math.PI*2;
        enemyBullets.push({x:b.x,y:b.y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,r:5,color:'#ff0000'});
      }
      const dx=player.x-b.x,dy=player.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      enemyBullets.push({x:b.x,y:b.y,vx:dx/d*7,vy:dy/d*7,r:7,color:'#ffff00'});
    }
  }
}

// ─── WAVE SPAWNING ────────────────────────────────────────────────────────────
function spawnWaveEnemies(){
  wave++;
  document.getElementById('levelBadge').textContent='SECTOR '+wave;
  bossSpawned=false;
  boss=null;
  document.getElementById('bossWrap').style.display='none';

  showWaveNotif('SECTOR '+wave, wave%3===0?'BOSS APPROACHING':'CLEAR THE SKIES');

  const formations=[
    ()=>{ // V formation
      for(let i=0;i<5;i++){
        const e=createEnemy('scout',CW/2-80+i*40,-40-Math.abs(i-2)*30);
        e.startX=e.x;enemies.push(e);
      }
    },
    ()=>{ // Flankers
      ['fighter','fighter'].forEach((t,i)=>{
        const e=createEnemy(t,50+i*(CW-100),-40);e.startX=e.x;
        e.pattern='sine';enemies.push(e);
      });
    },
    ()=>{ // Drone swarm
      for(let i=0;i<8;i++){
        const e=createEnemy('drone',40+i*(CW-80)/7,-40-i*20);
        e.vx=(Math.random()-0.5)*4;e.startX=e.x;enemies.push(e);
      }
    },
    ()=>{ // Heavy assault
      const e=createEnemy('heavy',CW/2,-40);e.startX=e.x;enemies.push(e);
      for(let i=0;i<3;i++){
        const s=createEnemy('scout',CW/4+i*CW/4,-80-i*30);s.startX=s.x;enemies.push(s);
      }
    },
  ];
  formations[Math.floor(Math.random()*formations.length)]();
}

function checkWaveComplete(){
  if(enemies.length===0 && !bossSpawned && !boss){
    if(wave%3===0){
      // Boss wave
      bossSpawned=true;
      boss=createBoss();
      document.getElementById('bossWrap').style.display='block';
      showWaveNotif('⚠ WARNING ⚠','BOSS UNIT DETECTED');
    } else {
      setTimeout(()=>{
        if(gameRunning) spawnWaveEnemies();
      },2000);
    }
  }
  if(boss && boss.hp<=0 && !boss.dead){
    boss.dead=true;
    spawnExplosion(boss.x,boss.y,'#ff6600',60,8);
    spawnExplosion(boss.x-30,boss.y-20,'#ff0000',40,5);
    spawnExplosion(boss.x+30,boss.y+10,'#ffcc00',40,5);
    score+=2000+wave*500;
    // Drop multiple powerups
    const types=POWERUP_TYPES.filter(t=>t.type!=='shield'&&t.type!=='hp');
    powerUps.push({...POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)],x:boss.x,y:boss.y});
    powerUps.push({...POWERUP_TYPES.find(t=>t.type==='hp'),x:boss.x+30,y:boss.y});
    boss=null;
    document.getElementById('bossWrap').style.display='none';
    setTimeout(()=>{ if(gameRunning) spawnWaveEnemies(); },3000);
  }
}

// ─── HIT PLAYER ───────────────────────────────────────────────────────────────
function hitPlayer(dmg){
  if(player.invincible>0) return;
  if(playerShield>0){
    playerShield=Math.max(0,playerShield-dmg*1.5);
    shieldRegen=180;
    spawnExplosion(player.x,player.y,'#00ffff',10,2);
  } else {
    playerHP=Math.max(0,playerHP-dmg);
    player.invincible=60;
    spawnExplosion(player.x,player.y,'#ff0066',15,3);
    canvas.style.animation='none';
    canvas.offsetHeight;
    canvas.style.animation='screenShake 0.3s';
    if(playerHP<=0){
      lives--;
      updateLivesDisplay();
      if(lives<=0){
        endGame();
      } else {
        playerHP=100;
        player.invincible=120;
        showPowerNotif('RESPAWNING..','#ff3366');
      }
    }
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('hpBar').style.width=(playerHP)+'%';
  document.getElementById('shieldBar').style.width=(playerShield)+'%';
  document.getElementById('scoreVal').textContent=String(score).padStart(6,'0');
  if(boss) document.getElementById('bossHp').style.width=(boss.hp/boss.maxHp*100)+'%';
}

function updateLivesDisplay(){
  const ld=document.getElementById('livesDisplay');
  ld.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 16 16');svg.classList.add('life-icon');
    svg.innerHTML='<polygon points="8,1 10,6 15,6 11,9.5 12.5,14.5 8,11 3.5,14.5 5,9.5 1,6 6,6" fill="#00ffff"/>';
    ld.appendChild(svg);
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime=0;
function gameLoop(ts){
  if(!gameRunning) return;
  const dt=Math.min(ts-lastTime,50); lastTime=ts;
  frameCount++;
  shieldRegen=Math.max(0,shieldRegen-1);
  if(shieldRegen===0 && playerShield<100){ playerShield=Math.min(100,playerShield+0.3); }
  if(powerUpTimer>0){ powerUpTimer--; if(powerUpTimer===0){ powerUpType=null; document.getElementById('powerLabel').style.display='none'; } }

  // BG
  drawBg();

  // Clear game canvas
  ctx.clearRect(0,0,CW,CH);

  // ── Draw player trail
  if(frameCount%2===0) spawnTrail(player.x,player.y);

  // ── Move player toward touch
  if(touchX!==null){
    const dx=touchX-player.x, dy=touchY-player.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>2){
      const spd=Math.min(dist,9);
      player.x+=dx/dist*spd;
      player.y+=dy/dist*spd;
    }
  }
  player.x=Math.max(player.w/2,Math.min(CW-player.w/2,player.x));
  player.y=Math.max(player.h/2,Math.min(CH-player.h/2,player.y));
  player.invincible=Math.max(0,player.invincible-1);

  // ── Fire
  player.fireTimer++;
  const fr = powerUpType==='laser'?4:powerUpType==='spread'?12:8;
  if(player.fireTimer>=fr){ player.fireTimer=0; fireBullet(player); }

  // ── Update & draw particles (under ships)
  drawParticles();

  // ── Power-ups
  powerUps.forEach(pu=>drawPowerUp(pu));
  powerUps=powerUps.filter(pu=>pu.y<CH+30);
  powerUps.forEach(pu=>{
    if(circleOverlap(player.x,player.y,22,pu.x,pu.y,16)){
      if(pu.type==='shield'){ playerShield=100; }
      else if(pu.type==='hp'){ playerHP=Math.min(100,playerHP+40); }
      else { powerUpType=pu.type; powerUpTimer=600; document.getElementById('powerLabel').style.display='block'; }
      showPowerNotif(pu.label,pu.color);
      updateHUD();
      pu.collected=true;
    }
  });
  powerUps=powerUps.filter(p=>!p.collected);

  // ── Player bullets
  bullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    drawBullet(b);
  });
  bullets=bullets.filter(b=>b.y>-50&&b.x>-20&&b.x<CW+20);

  // ── Enemies
  enemies.forEach(e=>updateEnemy(e));
  enemies.forEach(e=>{
    drawEnemy(e);
    // Bullet hit enemy
    bullets.forEach(b=>{
      if(rectsOverlap(b.x,b.y,b.w,b.h,e.x,e.y,e.w,e.h)){
        const dmg=powerUpType==='laser'?3:1;
        e.hp-=dmg;
        e.flashTimer=5;
        spawnExplosion(b.x,b.y,e.color,4,2);
        b.remove=true;
        if(powerUpType!=='laser') b.remove=true;
      }
    });
    bullets=bullets.filter(b=>!b.remove);
    // Enemy dead
    if(e.hp<=0){
      spawnExplosion(e.x,e.y,e.color,20,3);
      score+=e.pts;
      // Random powerup drop
      if(Math.random()<0.12){
        const pu=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
        powerUps.push({...pu,x:e.x,y:e.y});
      }
      e.dead=true;
    }
    // Player collision with enemy
    if(!e.dead && rectsOverlap(player.x,player.y,player.w-10,player.h-10,e.x,e.y,e.w-10,e.h-10)){
      hitPlayer(20);
    }
    // Enemy leaves screen
    if(e.y>CH+50) e.dead=true;
  });
  enemies=enemies.filter(e=>!e.dead);

  // ── Boss
  if(boss && !boss.dead){
    updateBoss(boss);
    drawBoss(boss);
    // Bullets hit boss
    bullets.forEach(b=>{
      if(circleOverlap(b.x,b.y,4,boss.x,boss.y,58)){
        const dmg=powerUpType==='laser'?3:1;
        boss.hp-=dmg;
        bossHP=boss.hp;
        boss.flashTimer=3;
        spawnExplosion(b.x,b.y,'#ff6600',5,2);
        if(Math.random()<0.3) spawnExplosion(boss.x+(Math.random()-0.5)*80,boss.y+(Math.random()-0.5)*80,'#ff0000',6,3);
        b.remove=true;
        updateHUD();
      }
    });
    bullets=bullets.filter(b=>!b.remove);
    // Player hit by boss
    if(circleOverlap(player.x,player.y,20,boss.x,boss.y,64)){ hitPlayer(30); }
  }

  // ── Enemy bullets
  enemyBullets.forEach(b=>drawEnemyBullet(b));
  enemyBullets=enemyBullets.filter(b=>b.x>-20&&b.x<CW+20&&b.y>-20&&b.y<CH+20);
  enemyBullets.forEach(b=>{
    if(circleOverlap(player.x,player.y,18,b.x,b.y,b.r||4)){
      hitPlayer(15);
      b.hit=true;
      spawnExplosion(b.x,b.y,'#ff3366',8,2);
    }
  });
  enemyBullets=enemyBullets.filter(b=>!b.hit);

  // ── Player ship
  drawPlayer(player);

  // ── Update score display
  document.getElementById('scoreVal').textContent=String(score).padStart(6,'0');
  updateHUD();

  // ── Check wave complete
  checkWaveComplete();

  requestAnimationFrame(gameLoop);
}

// ─── TOUCH INPUT ──────────────────────────────────────────────────────────────
function getTouchPos(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches[0];
  return{x:t.clientX-rect.left, y:t.clientY-rect.top};
}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const p=getTouchPos(e);
  touchX=p.x; touchY=p.y;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const p=getTouchPos(e);
  touchX=p.x; touchY=p.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length===0){ touchX=null; touchY=null; }
},{passive:false});
// Mouse support
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  touchX=e.clientX-rect.left; touchY=e.clientY-rect.top;
});
canvas.addEventListener('mouseleave',()=>{ touchX=null; touchY=null; });

// ─── START / END ──────────────────────────────────────────────────────────────
function startGame(){
  score=0; lives=3; wave=0;
  playerHP=100; playerShield=100; shieldRegen=0;
  powerUpType=null; powerUpTimer=0; frameCount=0;
  gameRunning=true;
  player=createPlayer();
  bullets=[]; enemies=[]; enemyBullets=[];
  particles=[]; powerUps=[]; boss=null; bossSpawned=false;
  initStars();
  updateLivesDisplay();
  updateHUD();
  overlay.style.display='none';
  spawnWaveEnemies();
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame(){
  gameRunning=false;
  if(score>highScore) highScore=score;
  spawnExplosion(player.x,player.y,'#ff0066',50,6);
  setTimeout(()=>{
    overlay.style.display='flex';
    overlay.innerHTML=`
      <div class="corner-tl"></div><div class="corner-tr"></div>
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="title-wrap">
        <div class="gameover-title">GAME OVER</div>
        <div class="final-score">${String(score).padStart(6,'0')}</div>
        <div class="high-score">BEST: ${String(highScore).padStart(6,'0')}</div>
      </div>
      <button class="start-btn" onclick="startGame()">RESTART</button>
      <div class="hint" style="margin-top:24px;">SECTOR ${wave} REACHED</div>
    `;
  },1500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initStars();
// Animate background on menu
function menuLoop(){
  if(gameRunning) return;
  drawBg();
  frameCount++;
  // Draw some ambient particles
  if(Math.random()<0.1){
    particles.push({
      x:Math.random()*CW,y:CH+10,
      vx:(Math.random()-0.5)*0.5,vy:-(Math.random()*1+0.5),
      life:0.8,decay:0.005,r:Math.random()*2+0.5,
      color:['#00ffff','#0066ff','#ff00ff'][Math.floor(Math.random()*3)],type:'trail'
    });
  }
  ctx.clearRect(0,0,CW,CH);
  drawParticles();
  requestAnimationFrame(menuLoop);
}
if(!particles) particles=[];
menuLoop();

// CSS for screen shake
const style=document.createElement('style');
style.textContent=`
@keyframes screenShake{
  0%,100%{transform:translate(-50%,-50%);}
  20%{transform:translate(calc(-50%+5px),calc(-50%+3px));}
  40%{transform:translate(calc(-50%-5px),calc(-50%-3px));}
  60%{transform:translate(calc(-50%+3px),calc(-50%-5px));}
  80%{transform:translate(calc(-50%-3px),calc(-50%+5px));}
}`;
document.head.appendChild(style);
</script>
</body>
</html>
