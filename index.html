<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>星际战机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      touch-action: none;
    }
    #gameContainer {
      position: relative;
      width: 480px;
      height: 100vh;
      max-height: 800px;
      overflow: hidden;
      background: #000010;
      box-shadow: 0 0 60px rgba(0,150,255,0.3);
    }
    canvas { display: block; width: 100%; height: 100%; }
    #ui {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    .ui-left, .ui-right { display: flex; flex-direction: column; gap: 6px; }
    .ui-label { font-size: 11px; color: rgba(100,200,255,0.7); letter-spacing: 2px; text-transform: uppercase; }
    .ui-value { font-size: 22px; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(0,180,255,0.8); }
    #healthBar { width: 120px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
    #healthFill { height: 100%; background: linear-gradient(90deg,#ff4444,#ff8800,#44ff88); border-radius: 4px; transition: width 0.2s; width: 100%; }
    #levelBadge { font-size: 13px; color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.6); font-weight: 600; letter-spacing: 1px; }
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20;
      background: rgba(0,0,20,0.88);
      backdrop-filter: blur(4px);
    }
    .screen.hidden { display: none; }
    .screen h1 {
      font-size: 38px; font-weight: 800; letter-spacing: 4px;
      background: linear-gradient(135deg,#00cfff,#a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .screen p { color: rgba(180,220,255,0.7); font-size: 13px; margin-bottom: 36px; letter-spacing: 1px; }
    .btn {
      padding: 14px 48px; font-size: 16px; font-weight: 700; letter-spacing: 3px;
      border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg,#0ea5e9,#7c3aed);
      color: #fff; text-transform: uppercase;
      box-shadow: 0 0 24px rgba(14,165,233,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { transform: scale(1.06); box-shadow: 0 0 36px rgba(14,165,233,0.7); }
    .btn:active { transform: scale(0.97); }
    #finalScore { font-size: 28px; color: #ffd700; font-weight: 700; margin-bottom: 10px; text-shadow: 0 0 12px rgba(255,215,0,0.5); }
    #highScoreDisplay { font-size: 13px; color: rgba(180,220,255,0.6); margin-bottom: 28px; letter-spacing: 1px; }
    #joystickZone { position: absolute; bottom: 0; left: 0; right: 0; height: 220px; z-index: 5; }
    #fireBtn {
      position: absolute; bottom: 40px; right: 30px;
      width: 70px; height: 70px; border-radius: 50%;
      background: radial-gradient(circle,rgba(255,80,80,0.9),rgba(200,0,0,0.7));
      border: 2px solid rgba(255,120,120,0.6);
      box-shadow: 0 0 20px rgba(255,60,60,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; z-index: 15;
      user-select: none; -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .combo-text {
      position: absolute; font-size: 18px; font-weight: 800;
      color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.8);
      pointer-events: none;
      animation: floatUp 0.9s ease forwards; z-index: 30;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      60%  { opacity:1; transform:translateY(-40px) scale(1.2); }
      100% { opacity:0; transform:translateY(-70px) scale(0.8); }
    }
    @media (max-width: 500px) {
      #gameContainer { width: 100vw; max-height: none; box-shadow: none; }
    }
  </style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div class="ui-left">
      <span class="ui-label">Score</span>
      <span class="ui-value" id="scoreDisplay">0</span>
      <span id="levelBadge">LEVEL 1</span>
    </div>
    <div class="ui-right">
      <span class="ui-label">HP</span>
      <div id="healthBar"><div id="healthFill"></div></div>
      <span class="ui-value" id="livesDisplay">♥ ♥ ♥</span>
    </div>
  </div>

  <div class="screen" id="startScreen">
    <h1>星际战机</h1>
    <p>消灭来袭的敌舰，守护星际和平</p>
    <button class="btn" id="startBtn">开始游戏</button>
    <p style="margin-top:20px;font-size:11px;color:rgba(100,180,255,0.4);">
      PC: WASD / 方向键 移动，空格 射击<br>手机: 虚拟摇杆 + 射击按钮
    </p>
  </div>

  <div class="screen hidden" id="gameOverScreen">
    <h1>GAME OVER</h1>
    <div id="finalScore"></div>
    <div id="highScoreDisplay"></div>
    <button class="btn" id="restartBtn">再来一局</button>
  </div>

  <div id="joystickZone"></div>
  <div id="fireBtn">🔥</div>
</div>

<script>
(function() {
  // ── Canvas Setup ────────────────────────────────────────────
  const canvas    = document.getElementById('canvas');
  const ctx       = canvas.getContext('2d');
  const container = document.getElementById('gameContainer');

  function resize() {
    canvas.width  = container.clientWidth;
    canvas.height = container.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Game State ───────────────────────────────────────────────
  const G = {
    score: 0, lives: 3, hp: 100, maxHp: 100,
    level: 1, running: false,
    highScore: parseInt(localStorage.getItem('hscore') || '0'),
    frame: 0, combo: 0, comboTimer: 0
  };

  // ── Stars / Nebula ───────────────────────────────────────────
  let stars  = [];
  let nebula = [];

  function initBg() {
    stars = Array.from({length: 180}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.6 + 0.3,
      s: Math.random() * 1.5 + 0.4,
      a: Math.random()
    }));
    nebula = Array.from({length: 4}, (_, i) => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 80 + Math.random() * 120,
      hue: [200,280,320,180][i],
      a: 0.04 + Math.random() * 0.06
    }));
  }

  function drawBackground() {
    const W = canvas.width, H = canvas.height;
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#000018'); bg.addColorStop(1,'#00000a');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    nebula.forEach(n => {
      n.y += 0.08;
      if (n.y - n.r > H) n.y = -n.r;
      const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0,`hsla(${n.hue},80%,50%,${n.a})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    });

    ctx.globalAlpha = 1;
    stars.forEach(s => {
      s.y += s.s;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      s.a = 0.5 + 0.5 * Math.sin(G.frame * 0.03 + s.x);
      ctx.globalAlpha = s.a;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // ── Player ───────────────────────────────────────────────────
  const player = {
    x: 240, y: 680, w: 36, h: 44,
    speed: 5, shootCool: 0, shootRate: 12,
    invincible: 0, thrustFrame: 0
  };

  function resetPlayer() {
    player.x = canvas.width / 2;
    player.y = canvas.height - 120;
    player.invincible = 0;
    player.shootCool  = 0;
  }

  function drawPlayer() {
    const {x, y, w, h, invincible} = player;
    if (invincible > 0 && Math.floor(G.frame / 5) % 2 === 0) return;
    ctx.save(); ctx.translate(x, y);

    const thrustSize = 8 + 4 * Math.sin(player.thrustFrame * 0.3);
    const eg = ctx.createRadialGradient(0,h/2+4,0,0,h/2+4,thrustSize*2.5);
    eg.addColorStop(0,'rgba(0,180,255,0.9)');
    eg.addColorStop(0.4,'rgba(80,120,255,0.5)');
    eg.addColorStop(1,'transparent');
    ctx.fillStyle = eg;
    ctx.beginPath(); ctx.arc(0,h/2+4,thrustSize*2.5,0,Math.PI*2); ctx.fill();

    ctx.fillStyle = `rgba(0,${140+Math.random()*60},255,0.9)`;
    ctx.beginPath();
    ctx.moveTo(-8,h/2); ctx.lineTo(0,h/2+thrustSize*2); ctx.lineTo(8,h/2);
    ctx.closePath(); ctx.fill();

    const bodyG = ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
    bodyG.addColorStop(0,'#60a5fa'); bodyG.addColorStop(0.5,'#1d4ed8'); bodyG.addColorStop(1,'#1e3a8a');
    ctx.fillStyle = bodyG;
    ctx.beginPath();
    ctx.moveTo(0,-h/2); ctx.lineTo(w/2,h/2-8);
    ctx.lineTo(w/2-8,h/2); ctx.lineTo(-w/2+8,h/2); ctx.lineTo(-w/2,h/2-8);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#3b82f6';
    ctx.beginPath(); ctx.moveTo(-w/2,h/2-16); ctx.lineTo(-w/2-14,h/2); ctx.lineTo(-w/2+4,h/2-4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(w/2,h/2-16);  ctx.lineTo(w/2+14,h/2);  ctx.lineTo(w/2-4,h/2-4);  ctx.closePath(); ctx.fill();

    const cg = ctx.createRadialGradient(0,-h/4,2,0,-h/4,10);
    cg.addColorStop(0,'rgba(180,230,255,0.95)'); cg.addColorStop(1,'rgba(30,100,200,0.4)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.ellipse(0,-h/4,8,11,0,0,Math.PI*2); ctx.fill();

    if (invincible > 0) {
      ctx.strokeStyle = `rgba(100,200,255,${(invincible % 20)/20})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
    player.thrustFrame++;
  }

  // ── Bullets ──────────────────────────────────────────────────
  const bullets  = [];
  const eBullets = [];

  function spawnBullet() {
    const lvl = G.level;
    if (lvl >= 3) {
      bullets.push({x:player.x-12,y:player.y-20,vx:-0.5,vy:-12});
      bullets.push({x:player.x,   y:player.y-24,vx:0,   vy:-13});
      bullets.push({x:player.x+12,y:player.y-20,vx:0.5, vy:-12});
    } else if (lvl >= 2) {
      bullets.push({x:player.x-8,y:player.y-22,vx:0,vy:-13});
      bullets.push({x:player.x+8,y:player.y-22,vx:0,vy:-13});
    } else {
      bullets.push({x:player.x,y:player.y-22,vx:0,vy:-14});
    }
  }

  function drawBullets() {
    bullets.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      ctx.save();
      const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,6);
      g.addColorStop(0,'rgba(255,255,255,1)');
      g.addColorStop(0.3,'rgba(0,220,255,0.9)');
      g.addColorStop(1,'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x,b.y,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(0,200,255,0.6)';
      ctx.beginPath(); ctx.arc(b.x,b.y+6,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    eBullets.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      ctx.save();
      const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,5);
      g.addColorStop(0,'rgba(255,255,255,1)');
      g.addColorStop(0.4,'rgba(255,80,80,0.9)');
      g.addColorStop(1,'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  // ── Enemies ──────────────────────────────────────────────────
  const enemies = [];

  const ENEMY_TYPES = [
    { w:32, h:32, hp:1, score:10, color:'#ef4444', speed:1.8, shootRate:0 },
    { w:38, h:36, hp:2, score:20, color:'#f97316', speed:1.2, shootRate:180 },
    { w:48, h:44, hp:4, score:50, color:'#8b5cf6', speed:0.9, shootRate:90 },
    { w:64, h:60, hp:10,score:150,color:'#ec4899', speed:0.6, shootRate:60  }
  ];

  function spawnEnemy() {
    const lvl = Math.min(G.level - 1, ENEMY_TYPES.length - 1);
    const pool = ENEMY_TYPES.slice(0,
