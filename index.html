<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STELLAR BLAZE ✦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#000;overflow:hidden;font-family:'Orbitron',monospace;user-select:none;touch-action:none;}
  canvas{display:block;position:fixed;top:0;left:0;}
  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
  #hud{position:absolute;top:0;left:0;width:100%;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;}
  #score-panel{display:flex;flex-direction:column;gap:2px;}
  #score-label{font-size:9px;letter-spacing:3px;color:rgba(100,220,255,0.6);text-transform:uppercase;}
  #score{font-size:28px;font-weight:900;color:#00eeff;text-shadow:0 0 20px #00eeff,0 0 40px #0088ff;letter-spacing:2px;transition:transform 0.1s;}
  #level-badge{background:linear-gradient(135deg,#ff6b00,#ff0066);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:2px;text-align:center;margin-top:4px;box-shadow:0 0 15px rgba(255,60,100,0.6);}
  #right-panel{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  #health-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  #health-label{font-size:9px;letter-spacing:3px;color:rgba(255,100,150,0.6);}
  #health-bar-bg{width:120px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;border:1px solid rgba(255,100,150,0.2);}
  #health-bar{height:100%;background:linear-gradient(90deg,#ff2d55,#ff6b9d);border-radius:4px;transition:width 0.3s;box-shadow:0 0 10px rgba(255,45,85,0.8);}
  #power-icons{display:flex;gap:6px;align-items:center;}
  .picon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);}
  #combo-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:900;color:#ffcc00;text-shadow:0 0 30px #ff6600;opacity:0;transition:opacity 0.3s;letter-spacing:3px;pointer-events:none;}
  #screens{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;}
  .screen{display:none;flex-direction:column;align-items:center;gap:20px;padding:40px 30px;max-width:380px;width:90%;}
  .screen.active{display:flex;}
  .screen-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center, rgba(0,30,60,0.92) 0%, rgba(0,0,15,0.97) 100%);backdrop-filter:blur(8px);}
  .screen-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;}
  .game-title{font-size:42px;font-weight:900;letter-spacing:6px;text-align:center;background:linear-gradient(135deg,#00eeff,#0088ff,#ff0066,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;animation:titlePulse 3s ease-in-out infinite;}
  .title-sub{font-size:11px;letter-spacing:8px;color:rgba(100,200,255,0.5);font-family:'Exo 2',sans-serif;font-weight:300;text-transform:uppercase;}
  .btn{padding:16px 48px;border-radius:40px;border:none;cursor:pointer;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:3px;pointer-events:all;transition:all 0.2s;position:relative;overflow:hidden;}
  .btn-primary{background:linear-gradient(135deg,#00eeff,#0066ff);color:#000;box-shadow:0 0 30px rgba(0,150,255,0.5);}
  .btn-primary:active{transform:scale(0.95);}
  .btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#fff,transparent);opacity:0.15;}
  .stat-row{display:flex;justify-content:space-between;width:100%;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-family:'Exo 2',sans-serif;}
  .stat-label{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px;}
  .stat-val{font-size:14px;color:#00eeff;font-weight:600;}
  .final-score-big{font-size:52px;font-weight:900;color:#ffcc00;text-shadow:0 0 40px #ff6600,0 0 80px rgba(255,100,0,0.3);}
  @keyframes titlePulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.3);}}
  #joystick-zone{position:fixed;bottom:60px;left:30px;width:130px;height:130px;pointer-events:all;z-index:15;}
  #joystick-base{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(0,150,255,0.08),rgba(0,80,200,0.03));border:1.5px solid rgba(0,200,255,0.2);position:absolute;top:0;left:0;}
  #joystick-knob{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(100,220,255,0.9),rgba(0,100,255,0.6));border:2px solid rgba(100,220,255,0.6);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 20px rgba(0,150,255,0.5),inset 0 0 10px rgba(255,255,255,0.1);transition:box-shadow 0.1s;}
  #shoot-btn{position:fixed;bottom:75px;right:35px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,100,120,0.9),rgba(200,0,50,0.7));border:2px solid rgba(255,100,150,0.6);pointer-events:all;z-index:15;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 25px rgba(255,50,80,0.5),inset 0 0 15px rgba(255,150,180,0.2);transition:transform 0.1s,box-shadow 0.1s;}
  #shoot-btn:active{transform:scale(0.9);box-shadow:0 0 40px rgba(255,50,80,0.8);}
  #bomb-btn{position:fixed;bottom:175px;right:42px;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,200,0,0.9),rgba(200,100,0,0.7));border:2px solid rgba(255,200,50,0.6);pointer-events:all;z-index:15;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(255,150,0,0.4);}
  #bomb-count{position:absolute;top:-5px;right:-5px;background:#ff2d55;color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;}
  #wave-announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:15;opacity:0;}
  #wave-text{font-size:36px;font-weight:900;letter-spacing:6px;color:#fff;text-shadow:0 0 40px #00eeff,0 0 80px #0066ff;}
  #wave-sub{font-size:12px;letter-spacing:4px;color:rgba(100,200,255,0.7);font-family:'Exo 2',sans-serif;margin-top:8px;}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="hud">
    <div id="score-panel">
      <div id="score-label">SCORE</div>
      <div id="score">000000</div>
      <div id="level-badge">WAVE 01</div>
    </div>
    <div id="right-panel">
      <div id="health-wrap">
        <div id="health-label">HULL INTEGRITY</div>
        <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
      </div>
      <div id="power-icons">
        <div class="picon" id="picon-shield" title="Shield">🛡</div>
        <div class="picon" id="picon-rapid" title="Rapid Fire">⚡</div>
        <div class="picon" id="picon-spread" title="Spread">💠</div>
      </div>
    </div>
  </div>
  <div id="combo-display">COMBO x0</div>
  <div id="wave-announce">
    <div id="wave-text">WAVE 1</div>
    <div id="wave-sub">PREPARE FOR BATTLE</div>
  </div>
</div>

<div id="joystick-zone" style="display:none">
  <div id="joystick-base"></div>
  <div id="joystick-knob"></div>
</div>
<div id="shoot-btn" style="display:none">🔥</div>
<div id="bomb-btn" style="display:none">💣<span id="bomb-count">3</span></div>

<div id="screens">
  <div class="screen-bg"></div>
  <div id="start-screen" class="screen active">
    <div class="screen-content">
      <div>
        <div class="game-title">STELLAR<br>BLAZE</div>
        <div class="title-sub" style="margin-top:8px;text-align:center;">◈ APEX SPACE COMBAT ◈</div>
      </div>
      <div style="font-family:'Exo 2',sans-serif;font-size:12px;color:rgba(150,200,255,0.5);text-align:center;line-height:1.8;letter-spacing:1px;">
        虚空中，最后的战士<br>拖拽操控 · 自动射击 · 无尽荣耀
      </div>
      <button class="btn btn-primary" onclick="startGame()">▶ 开始征程</button>
      <div style="font-family:'Exo 2',sans-serif;font-size:10px;color:rgba(100,150,200,0.35);letter-spacing:3px;text-align:center;">TOUCH JOYSTICK TO MOVE · AUTO FIRE</div>
    </div>
  </div>
  <div id="over-screen" class="screen">
    <div class="screen-content">
      <div style="font-size:13px;letter-spacing:5px;color:rgba(255,80,100,0.7);font-family:'Exo 2',sans-serif;">MISSION FAILED</div>
      <div class="final-score-big" id="final-score">0</div>
      <div style="color:rgba(100,200,255,0.5);font-size:10px;letter-spacing:3px;">FINAL SCORE</div>
      <div style="width:100%;margin:10px 0;">
        <div class="stat-row"><span class="stat-label">BEST SCORE</span><span class="stat-val" id="best-score-val">0</span></div>
        <div class="stat-row"><span class="stat-label">WAVE REACHED</span><span class="stat-val" id="wave-reached">1</span></div>
        <div class="stat-row"><span class="stat-label">ENEMIES KILLED</span><span class="stat-val" id="kills-val">0</span></div>
      </div>
      <button class="btn btn-primary" onclick="startGame()">↻ RETRY</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STELLAR BLAZE - APEX SPACE COMBAT ENGINE
// ═══════════════════════════════════════════════

const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = bgCanvas.width = window.innerWidth;
  H = canvas.height = bgCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── AUDIO ENGINE ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audio = null;
let masterGain, musicGain, sfxGain;
let bgmPlaying = false;

function initAudio() {
  if (audio) return;
  audio = new AudioCtx();
  masterGain = audio.createGain(); masterGain.gain.value = 0.8;
  musicGain = audio.createGain(); musicGain.gain.value = 0.35;
  sfxGain = audio.createGain(); sfxGain.gain.value = 0.7;
  masterGain.connect(audio.destination);
  musicGain.connect(masterGain);
  sfxGain.connect(masterGain);
  startBGM();
}

// Procedural chiptune BGM
let bgmInterval = null;
const NOTE = n => 440 * Math.pow(2, (n-69)/12);
const MELODY = [60,64,67,72,71,67,64,60, 62,65,69,74,72,69,65,62];
const BASS   = [36,36,43,43,41,41,38,38, 38,38,45,45,43,43,40,40];
let mbeat = 0, bbeat = 0;
const TEMPO = 140;

function playNote(freq, dur, type='square', gain=0.15, dest=musicGain, detune=0) {
  if (!audio) return;
  const o = audio.createOscillator();
  const g = audio.createGain();
  const f = audio.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 2000;
  o.type = type; o.frequency.value = freq; o.detune.value = detune;
  g.gain.setValueAtTime(gain, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur * 0.9);
  o.connect(f); f.connect(g); g.connect(dest);
  o.start(); o.stop(audio.currentTime + dur);
}

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  const interval = (60 / TEMPO) * 0.5 * 1000;
  bgmInterval = setInterval(() => {
    if (!audio || audio.state === 'suspended') return;
    const mi = mbeat % MELODY.length;
    const bi = bbeat % BASS.length;
    playNote(NOTE(MELODY[mi]), 0.18, 'square', 0.12);
    if (mbeat % 2 === 0) playNote(NOTE(MELODY[mi]+7), 0.15, 'square', 0.06, musicGain, 5);
    if (bbeat % 2 === 0) playNote(NOTE(BASS[bi]), 0.28, 'sawtooth', 0.08);
    if (mbeat % 4 === 0) playDrum();
    if (mbeat % 4 === 2) playSnare();
    mbeat++; bbeat++;
  }, interval);
}

function playDrum() {
  if (!audio) return;
  const o = audio.createOscillator();
  const g = audio.createGain();
  o.frequency.setValueAtTime(150, audio.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, audio.currentTime + 0.15);
  g.gain.setValueAtTime(0.5, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.15);
  o.connect(g); g.connect(musicGain);
  o.start(); o.stop(audio.currentTime + 0.15);
}

function playSnare() {
  if (!audio) return;
  const buf = audio.createBuffer(1, audio.sampleRate * 0.1, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * Math.exp(-i/5000);
  const src = audio.createBufferSource();
  const g = audio.createGain();
  src.buffer = buf;
  g.gain.value = 0.3;
  src.connect(g); g.connect(musicGain);
  src.start();
}

function sfxShoot() {
  if (!audio) return;
  const o = audio.createOscillator();
  const g = audio.createGain();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(800, audio.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audio.currentTime + 0.08);
  g.gain.setValueAtTime(0.4, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.08);
  o.connect(g); g.connect(sfxGain);
  o.start(); o.stop(audio.currentTime + 0.08);
}

function sfxExplode(big=false) {
  if (!audio) return;
  const buf = audio.createBuffer(1, audio.sampleRate * (big?0.6:0.3), audio.sampleRate);
  const d = buf.getChannelData(0);
  const len = d.length;
  for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(len*0.3));
  const src = audio.createBufferSource();
  const g = audio.createGain();
  const f = audio.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = big?600:900;
  src.buffer = buf;
  g.gain.value = big?1.2:0.6;
  src.connect(f); f.connect(g); g.connect(sfxGain);
  src.start();
}

function sfxPowerup() {
  if (!audio) return;
  [0,3,7,12].forEach((n,i) => {
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.type = 'sine'; o.frequency.value = NOTE(72+n);
    g.gain.setValueAtTime(0, audio.currentTime + i*0.08);
    g.gain.linearRampToValueAtTime(0.3, audio.currentTime + i*0.08 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + i*0.08 + 0.15);
    o.connect(g); g.connect(sfxGain);
    o.start(audio.currentTime + i*0.08);
    o.stop(audio.currentTime + i*0.08 + 0.2);
  });
}

function sfxBomb() {
  if (!audio) return;
  const len = audio.sampleRate * 1.2;
  const buf = audio.createBuffer(1, len, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(len*0.2)) * Math.sin(i/50);
  const src = audio.createBufferSource();
  const g = audio.createGain();
  g.gain.value = 1.5;
  src.buffer = buf; src.connect(g); g.connect(sfxGain); src.start();
}

function sfxHit() {
  if (!audio) return;
  const o = audio.createOscillator();
  const g = audio.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(120, audio.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, audio.currentTime + 0.1);
  g.gain.setValueAtTime(0.3, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.1);
  o.connect(g); g.connect(sfxGain);
  o.start(); o.stop(audio.currentTime + 0.1);
}

// ── GAME STATE ────────────────────────────────
let state = 'menu'; // menu, playing, over
let score = 0, bestScore = 0, wave = 1, kills = 0;
let shake = 0, shakeX = 0, shakeY = 0;
let frameCount = 0;
let combo = 0, comboTimer = 0;
let bombs = 3;
let gameActive = false;

// ── ENTITIES ──────────────────────────────────
let player, bullets, enemyBullets, enemies, particles, powerups, stars, nebulas;

function initStars() {
  stars = [];
  nebulas = [];
  for (let i=0;i<200;i++) {
    stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.8+0.2,
      speed:Math.random()*1.5+0.3, alpha:Math.random()*0.8+0.2,
      color:['#ffffff','#aaddff','#ffccaa','#ccccff'][Math.floor(Math.random()*4)]});
  }
  for (let i=0;i<6;i++) {
    nebulas.push({x:Math.random()*W, y:Math.random()*H,
      rx:Math.random()*200+100, ry:Math.random()*120+60,
      hue:Math.random()*360, alpha:0.04+Math.random()*0.06});
  }
  drawBackground();
}

function drawBackground() {
  bgCtx.clearRect(0,0,W,H);
  // Deep space gradient
  const grad = bgCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.8);
  grad.addColorStop(0,'#030a1a');
  grad.addColorStop(0.5,'#010510');
  grad.addColorStop(1,'#000005');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0,0,W,H);
  // Nebulas
  nebulas.forEach(n => {
    const g = bgCtx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.rx);
    g.addColorStop(0,`hsla(${n.hue},80%,60%,${n.alpha})`);
    g.addColorStop(1,'transparent');
    bgCtx.save();
    bgCtx.scale(1, n.ry/n.rx);
    bgCtx.fillStyle = g;
    bgCtx.beginPath();
    bgCtx.arc(n.x, n.y * n.rx/n.ry, n.rx, 0, Math.PI*2);
    bgCtx.fill();
    bgCtx.restore();
  });
}

class Player {
  constructor() {
    this.x = W/2; this.y = H * 0.75;
    this.w = 36; this.h = 46;
    this.hp = 100; this.maxHp = 100;
    this.vx = 0; this.vy = 0;
    this.speed = 5.5;
    this.fireRate = 8; this.fireCd = 0;
    this.invincible = 0;
    this.shield = 0;
    this.rapid = 0;
    this.spread = 0;
    this.thrustParticleTimer = 0;
    this.tilt = 0;
    this.engineGlow = 0;
  }

  update() {
    // Move toward target via joystick
    const dx = joyX * this.speed;
    const dy = joyY * this.speed;
    this.tilt += (dx * 0.15 - this.tilt) * 0.1;
    this.x = Math.max(this.w/2, Math.min(W - this.w/2, this.x + dx));
    this.y = Math.max(this.h/2, Math.min(H - this.h/2, this.y + dy));

    // Engine particles
    this.thrustParticleTimer++;
    if (this.thrustParticleTimer % 2 === 0) {
      const spread = 6;
      for (let i=0;i<2;i++) {
        particles.push(new Particle(
          this.x + (Math.random()-0.5)*10, this.y + this.h/2,
          (Math.random()-0.5)*spread, Math.random()*4+2,
          3+Math.random()*4, 0.9,
          `hsl(${190+Math.random()*40},100%,${60+Math.random()*30}%)`,
          'engine'
        ));
      }
    }
    this.engineGlow = 0.7 + Math.sin(frameCount*0.2)*0.3;

    // Power-up timers
    if (this.shield > 0) this.shield--;
    if (this.rapid > 0) this.rapid--;
    if (this.spread > 0) this.spread--;
    if (this.invincible > 0) this.invincible--;

    // Auto-fire
    this.fireCd--;
    const rate = this.rapid > 0 ? 3 : this.fireRate;
    if (this.fireCd <= 0 && (autoFire || shootHeld)) {
      this.fire();
      this.fireCd = rate;
    }
  }

  fire() {
    sfxShoot();
    const bx = this.x, by = this.y - this.h/2;
    if (this.spread > 0) {
      [-18,-9,0,9,18].forEach(angle => {
        const rad = angle * Math.PI/180;
        bullets.push(new Bullet(bx, by, Math.sin(rad)*4, -12+Math.cos(rad)*3, false));
      });
    } else {
      bullets.push(new Bullet(bx-8, by, 0, -14, false));
      bullets.push(new Bullet(bx+8, by, 0, -14, false));
    }
    // Muzzle flash
    for (let i=0;i<4;i++) {
      particles.push(new Particle(bx, by, (Math.random()-0.5)*3, -Math.random()*3-1,
        3+Math.random()*3, 0.85, '#00eeff', 'spark'));
    }
  }

  draw() {
    const x=this.x, y=this.y, w=this.w, h=this.h;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(this.tilt * 0.02);
    if (this.invincible > 0 && Math.floor(frameCount/4)%2) {ctx.restore();return;}

    // Engine glow
    const eg = ctx.createRadialGradient(0, h*0.45, 0, 0, h*0.45, 30*this.engineGlow);
    eg.addColorStop(0, `rgba(0,200,255,${0.5*this.engineGlow})`);
    eg.addColorStop(1,'transparent');
    ctx.fillStyle = eg;
    ctx.fillRect(-30, 0, 60, 60);

    // Shield bubble
    if (this.shield > 0) {
      const sp = this.shield / 360;
      ctx.beginPath();
      ctx.arc(0, 0, 50, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(0,200,255,${0.3 + sp*0.4})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      const sg = ctx.createRadialGradient(0,0,0,0,0,50);
      sg.addColorStop(0,'transparent');
      sg.addColorStop(1,`rgba(0,200,255,${0.08*sp})`);
      ctx.fillStyle = sg;
      ctx.fill();
    }

    // Main hull - futuristic fighter
    ctx.save();
    // Wing glow
    const wg = ctx.createLinearGradient(0,-h/2,0,h/2);
    wg.addColorStop(0,'rgba(0,180,255,0.6)');
    wg.addColorStop(1,'rgba(0,60,180,0.2)');
    
    // Left wing
    ctx.beginPath();
    ctx.moveTo(0,-h*0.1);ctx.lineTo(-w,-h*0.4);ctx.lineTo(-w*1.2,h*0.45);ctx.lineTo(-w*0.6,h*0.3);ctx.lineTo(-w*0.15,0);
    ctx.closePath();
    const lwg = ctx.createLinearGradient(-w,-h*0.4,-w*0.15,h*0.3);
    lwg.addColorStop(0,'#003380');lwg.addColorStop(0.5,'#0055cc');lwg.addColorStop(1,'#001144');
    ctx.fillStyle=lwg; ctx.fill();
    ctx.strokeStyle='rgba(0,200,255,0.5)'; ctx.lineWidth=1; ctx.stroke();
    
    // Right wing
    ctx.beginPath();
    ctx.moveTo(0,-h*0.1);ctx.lineTo(w,-h*0.4);ctx.lineTo(w*1.2,h*0.45);ctx.lineTo(w*0.6,h*0.3);ctx.lineTo(w*0.15,0);
    ctx.closePath();
    const rwg = ctx.createLinearGradient(w,-h*0.4,w*0.15,h*0.3);
    rwg.addColorStop(0,'#003380');rwg.addColorStop(0.5,'#0055cc');rwg.addColorStop(1,'#001144');
    ctx.fillStyle=rwg; ctx.fill();
    ctx.strokeStyle='rgba(0,200,255,0.5)'; ctx.lineWidth=1; ctx.stroke();

    // Main body
    ctx.beginPath();
    ctx.moveTo(0,-h*0.55);ctx.lineTo(w*0.25,-h*0.1);ctx.lineTo(w*0.2,h*0.45);
    ctx.lineTo(0,h*0.55);ctx.lineTo(-w*0.2,h*0.45);ctx.lineTo(-w*0.25,-h*0.1);
    ctx.closePath();
    const bg2 = ctx.createLinearGradient(0,-h*0.55,0,h*0.55);
    bg2.addColorStop(0,'#0066ff');bg2.addColorStop(0.4,'#0044cc');bg2.addColorStop(1,'#001166');
    ctx.fillStyle=bg2; ctx.fill();
    ctx.strokeStyle='rgba(100,220,255,0.7)'; ctx.lineWidth=1.5; ctx.stroke();

    // Cockpit
    ctx.beginPath();
    ctx.ellipse(0,-h*0.15,w*0.12,h*0.22,0,0,Math.PI*2);
    const cg = ctx.createRadialGradient(-2,-h*0.2,0,-2,-h*0.2,w*0.12);
    cg.addColorStop(0,'rgba(150,230,255,0.9)');cg.addColorStop(1,'rgba(0,100,200,0.7)');
    ctx.fillStyle=cg; ctx.fill();
    ctx.strokeStyle='rgba(100,220,255,0.8)'; ctx.lineWidth=1; ctx.stroke();

    // Wing lights
    [-w,-w].forEach((wx,i) => {
      const s = i===0?-1:1;
      ctx.beginPath();ctx.arc(s*w*0.9,h*0.1,4,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,${80+Math.sin(frameCount*0.15)*60},0,0.9)`;
      ctx.fill();
      const fl = ctx.createRadialGradient(s*w*0.9,h*0.1,0,s*w*0.9,h*0.1,12);
      fl.addColorStop(0,`rgba(255,100,0,0.4)`);fl.addColorStop(1,'transparent');
      ctx.fillStyle=fl;ctx.beginPath();ctx.arc(s*w*0.9,h*0.1,12,0,Math.PI*2);ctx.fill();
    });

    // Gun barrels
    [-w*0.22,w*0.22].forEach(gx => {
      ctx.fillStyle='rgba(0,180,255,0.8)';
      ctx.fillRect(gx-2,-h*0.55,4,-10);
      const gg = ctx.createLinearGradient(gx,-h*0.55,gx,-h*0.55-10);
      gg.addColorStop(0,'rgba(0,220,255,0.8)');gg.addColorStop(1,'rgba(0,220,255,0.2)');
      ctx.fillStyle=gg;
      ctx.fillRect(gx-2,-h*0.55,4,-10);
    });

    ctx.restore();
    ctx.restore();
  }
}

class Bullet {
  constructor(x,y,vx,vy,enemy=false,color,r=4) {
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.enemy=enemy;this.dead=false;
    this.r=r;
    this.color=color||(enemy?'#ff4466':'#00eeff');
    this.trail=[];
    this.len=enemy?12:20;
  }
  update() {
    this.trail.push({x:this.x,y:this.y});
    if (this.trail.length>8) this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    if (this.y<-50||this.y>H+50||this.x<-50||this.x>W+50) this.dead=true;
  }
  draw() {
    // Trail
    for (let i=0;i<this.trail.length;i++) {
      const a=i/this.trail.length*0.6;
      const r=this.r*(i/this.trail.length);
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${this.enemy?'255,60,100':'0,220,255'},${a})`;ctx.fill();
    }
    // Bullet
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
    g.addColorStop(0,this.enemy?'rgba(255,150,180,1)':'rgba(200,240,255,1)');
    g.addColorStop(0.4,this.color);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.r*2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=this.enemy?'#fff':'#00ffff';
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*0.5,0,Math.PI*2);ctx.fill();
  }
}

class Particle {
  constructor(x,y,vx,vy,r,decay,color,type='default') {
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.r=r;this.decay=decay;this.color=color;
    this.alpha=1;this.type=type;this.dead=false;
  }
  update() {
    this.x+=this.vx;this.y+=this.vy;
    this.alpha*=this.decay;this.r*=this.decay;
    this.vy+=0.05;
    if (this.alpha<0.01||this.r<0.1) this.dead=true;
    if (this.type==='engine'){this.vy*=0.95;this.vx*=0.95;}
  }
  draw() {
    ctx.save();ctx.globalAlpha=this.alpha;
    if (this.type==='spark'||this.type==='engine') {
      ctx.shadowBlur=8;ctx.shadowColor=this.color;
    }
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=this.color;ctx.fill();
    ctx.restore();
  }
}

function bigExplosion(x,y,big=false) {
  const count=big?80:40;
  const colors=['#ff6600','#ffaa00','#ff2200','#ffcc00','#ff4400','#fff','#ff8800'];
  for (let i=0;i<count;i++) {
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*(big?8:5)+1;
    particles.push(new Particle(
      x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,
      big?Math.random()*14+4:Math.random()*8+2,
      0.88+Math.random()*0.05,
      colors[Math.floor(Math.random()*colors.length)],'spark'
    ));
  }
  // Shockwave
  particles.push({x,y,r:2,maxR:big?120:70,dead:false,alpha:0.8,type:'shockwave',update(){
    this.r+=big?12:7;this.alpha-=big?0.05:0.08;if(this.r>this.maxR)this.dead=true;
  },draw(){
    ctx.save();ctx.globalAlpha=this.alpha;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle=big?'#ffaa00':'#ff6600';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  }});
  if (big) shake=20; else shake=8;
  sfxExplode(big);
}

// ── ENEMY BASE ────────────────────────────────
class Enemy {
  constructor(x,y,hp,type='basic') {
    this.x=x;this.y=y;this.hp=hp;this.maxHp=hp;
    this.type=type;this.dead=false;this.t=0;
    this.fireCd=Math.random()*60+60;
    this.vx=0;this.vy=1.5;
    this.w=30;this.h=30;
    this.points=100;
    this.flashTimer=0;
  }
  hit(dmg) {
    this.hp-=dmg;this.flashTimer=8;
    if (this.hp<=0) {this.dead=true;return true;}
    return false;
  }
  drawHealthBar() {
    if (this.hp>=this.maxHp) return;
    const bw=this.w*2,bh=4,bx=this.x-bw/2,by=this.y-this.h/2-10;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by,bw,bh);
    const pct=this.hp/this.maxHp;
    const hg=ctx.createLinearGradient(bx,by,bx+bw,by);
    hg.addColorStop(0,'#ff2d55');hg.addColorStop(1,'#ff6b9d');
    ctx.fillStyle=hg;ctx.fillRect(bx,by,bw*pct,bh);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.5;ctx.strokeRect(bx,by,bw,bh);
  }
  flash() {return this.flashTimer>0&&Math.floor(this.flashTimer/2)%2;}
}

class BasicEnemy extends Enemy {
  constructor(x,y,wave) {
    super(x,y,20+wave*5,'basic');
    this.vy=1.5+wave*0.2;
    this.speed=1+Math.random();
    this.angle=Math.random()*Math.PI*2;
    this.points=100+wave*10;
    this.hue=Math.random()*60+180;
    this.size=18+Math.random()*8;
  }
  update() {
    this.t++;
    this.x+=Math.sin(this.t*0.03)*2;
    this.y+=this.vy;
    this.angle+=0.04;
    this.fireCd--;
    if (this.fireCd<=0) {this.shoot();this.fireCd=90+Math.random()*60;}
    if (this.y>H+60) this.dead=true;
    if (this.flashTimer>0) this.flashTimer--;
  }
  shoot() {
    const dx=player.x-this.x,dy=player.y-this.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    enemyBullets.push(new Bullet(this.x,this.y,dx/len*4,dy/len*4,true));
  }
  draw() {
    const {x,y,size:s,hue:h,angle:a}=this;
    ctx.save();ctx.translate(x,y);ctx.rotate(a);
    if (this.flash()) {ctx.globalAlpha=0.5;}
    // Glow
    const g=ctx.createRadialGradient(0,0,0,0,0,s*1.5);
    g.addColorStop(0,`hsla(${h},100%,70%,0.3)`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s*1.5,0,Math.PI*2);ctx.fill();
    // Body - alien craft
    const fg=ctx.createRadialGradient(0,-s*0.2,0,0,0,s);
    fg.addColorStop(0,`hsl(${h+20},100%,70%)`);fg.addColorStop(1,`hsl(${h},80%,30%)`);
    ctx.beginPath();
    for (let i=0;i<6;i++) {
      const r=i%2===0?s:s*0.6,ang=i*Math.PI/3;
      i===0?ctx.moveTo(Math.cos(ang)*r,Math.sin(ang)*r):ctx.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);
    }
    ctx.closePath();ctx.fillStyle=fg;ctx.fill();
    ctx.strokeStyle=`hsl(${h},100%,80%)`;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,s*0.3,0,Math.PI*2);
    ctx.fillStyle=`hsl(${h},100%,85%)`;ctx.fill();
    ctx.restore();
    this.drawHealthBar();
  }
}

class TankEnemy extends Enemy {
  constructor(x,y,wave) {
    super(x,y,80+wave*15,'tank');
    this.vy=0.8+wave*0.1;this.points=300+wave*20;
    this.size=32;
  }
  update() {
    this.t++;this.y+=this.vy;this.x+=Math.sin(this.t*0.02)*1.5;
    this.fireCd--;
    if (this.fireCd<=0){this.shoot();this.fireCd=50+Math.random()*30;}
    if (this.y>H+80)this.dead=true;
    if (this.flashTimer>0)this.flashTimer--;
  }
  shoot() {
    for (let i=-1;i<=1;i++) {
      const dx=player.x-this.x+i*30,dy=player.y-this.y;
      const len=Math.sqrt(dx*dx+dy*dy);
      enemyBullets.push(new Bullet(this.x,this.y,dx/len*3.5,dy/len*3.5,true,'#ff6600',5));
    }
  }
  draw() {
    const {x,y,size:s}=this;
    ctx.save();ctx.translate(x,y);
    if (this.flash())ctx.globalAlpha=0.4;
    // Outer ring
    ctx.beginPath();ctx.arc(0,0,s*1.3,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,100,0,${0.3+Math.sin(this.t*0.1)*0.2})`;ctx.lineWidth=2;ctx.stroke();
    // Body
    const g=ctx.createRadialGradient(0,-s*0.2,0,0,0,s);
    g.addColorStop(0,'#ff8833');g.addColorStop(0.6,'#cc3300');g.addColorStop(1,'#660000');
    ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(255,150,50,0.8)';ctx.lineWidth=2;ctx.stroke();
    // Armor plates
    for (let i=0;i<8;i++){
      const a=i*Math.PI/4,r=s*0.7;
      ctx.save();ctx.rotate(a+this.t*0.02);
      ctx.fillStyle='rgba(200,60,0,0.6)';
      ctx.fillRect(-4,-r-6,8,6);ctx.restore();
    }
    ctx.beginPath();ctx.arc(0,0,s*0.35,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,100,0.9)';ctx.fill();
    ctx.restore();
    this.drawHealthBar();
  }
}

class ZigzagEnemy extends Enemy {
  constructor(x,y,wave) {
    super(x,y,15+wave*3,'zigzag');
    this.vy=2.5+wave*0.3;this.dir=Math.random()>0.5?1:-1;
    this.size=14;this.points=200+wave*15;
  }
  update() {
    this.t++;this.y+=this.vy;
    this.x+=Math.sin(this.t*0.08)*6*this.dir;
    if (this.x<20||this.x>W-20)this.dir*=-1;
    if (this.y>H+50)this.dead=true;
    if (this.flashTimer>0)this.flashTimer--;
  }
  draw() {
    const {x,y,size:s,t}=this;
    ctx.save();ctx.translate(x,y);ctx.rotate(t*0.08);
    if (this.flash())ctx.globalAlpha=0.4;
    const g=ctx.createRadialGradient(0,0,0,0,0,s);
    g.addColorStop(0,'#ff44ff');g.addColorStop(1,'#440066');
    ctx.beginPath();
    for (let i=0;i<4;i++){
      const a=i*Math.PI/2-Math.PI/4,r=i%2===0?s:s*0.5;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(255,150,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
    this.drawHealthBar();
  }
}

// ── BOSS ──────────────────────────────────────
class BossEnemy extends Enemy {
  constructor(wave) {
    super(W/2,-100,500+wave*100,'boss');
    this.targetY=100;this.phase=1;this.phaseTimer=0;
    this.size=60;this.vy=1;this.vx=0;this.points=5000+wave*500;
    this.attackMode=0;this.attackTimer=0;
    this.rotorAngle=0;this.shieldHp=3;
    this.announced=false;
  }
  update() {
    this.t++;this.rotorAngle+=0.03;
    // Enter
    if (this.y<this.targetY){this.y+=this.vy*3;return;}
    // Phase movement
    this.x+=Math.sin(this.t*0.015)*3;
    this.x=Math.max(this.size+20,Math.min(W-this.size-20,this.x));
    // Phase transitions
    const hpPct=this.hp/this.maxHp;
    if (hpPct<0.5&&this.phase===1){this.phase=2;this.shieldHp=0;}
    if (hpPct<0.25&&this.phase===2){this.phase=3;}
    // Attack patterns
    this.attackTimer++;
    const cd=this.phase===1?70:this.phase===2?45:25;
    if (this.attackTimer>=cd){this.attack();this.attackTimer=0;this.attackMode=(this.attackMode+1)%4;}
    if (this.flashTimer>0)this.flashTimer--;
  }
  attack() {
    const cx=this.x,cy=this.y;
    if (this.attackMode===0) {
      // Aimed
      const dx=player.x-cx,dy=player.y-cy,len=Math.sqrt(dx*dx+dy*dy);
      enemyBullets.push(new Bullet(cx,cy,dx/len*5,dy/len*5,true,'#ff0044',6));
    } else if (this.attackMode===1) {
      // Radial burst
      const n=this.phase===3?16:10;
      for (let i=0;i<n;i++){
        const a=i*Math.PI*2/n+this.t*0.1;
        enemyBullets.push(new Bullet(cx,cy,Math.cos(a)*4,Math.sin(a)*4,true,'#ff6600',5));
      }
    } else if (this.attackMode===2) {
      // Shotgun
      for (let i=-2;i<=2;i++){
        const base=Math.PI/2,spread=i*0.2;
        enemyBullets.push(new Bullet(cx,cy,Math.cos(base+spread)*5,Math.sin(base+spread)*5,true,'#ff00cc',5));
      }
    } else {
      // Tracking x3
      for (let i=0;i<3;i++) {
        setTimeout(()=>{
          if (!player||!gameActive)return;
          const dx=player.x-cx,dy=player.y-cy,len=Math.sqrt(dx*dx+dy*dy);
          enemyBullets.push(new Bullet(cx,cy,dx/len*6,dy/len*6,true,'#ff2200',5));
        },i*150);
      }
    }
  }
  draw() {
    const {x,y,size:s,t,rotorAngle:ra}=this;
    ctx.save();ctx.translate(x,y);
    if (this.flash())ctx.globalAlpha=0.3;
    // Aura
    const aura=ctx.createRadialGradient(0,0,s*0.5,0,0,s*2.5);
    aura.addColorStop(0,`rgba(200,0,255,${0.15+Math.sin(t*0.05)*0.08})`);
    aura.addColorStop(1,'transparent');
    ctx.fillStyle=aura;ctx.beginPath();ctx.arc(0,0,s*2.5,0,Math.PI*2);ctx.fill();
    // Rotating rings
    for (let r=0;r<3;r++){
      ctx.save();ctx.rotate(ra*(r+1)*(r%2?-1:1));
      ctx.beginPath();ctx.arc(0,0,s*(0.9+r*0.25),0,Math.PI*1.5);
      ctx.strokeStyle=`rgba(${r===0?'200,0,255':r===1?'255,0,100':'100,0,255'},0.6)`;
      ctx.lineWidth=3-r;ctx.stroke();
      ctx.restore();
    }
    // Main body
    const bg=ctx.createRadialGradient(0,-s*0.1,0,0,0,s);
    bg.addColorStop(0,'#440066');bg.addColorStop(0.6,'#220033');bg.addColorStop(1,'#0a000f');
    ctx.beginPath();
    for (let i=0;i<8;i++){
      const a=i*Math.PI/4+ra*0.3,r=i%2===0?s:s*0.75;
      i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fillStyle=bg;ctx.fill();
    ctx.strokeStyle='rgba(200,0,255,0.8)';ctx.lineWidth=2;ctx.stroke();
    // Core
    const phase=this.phase;
    const coreColor=phase===1?['#dd00ff','#8800cc']:phase===2?['#ff4400','#cc2200']:['#ffffff','#ffaa00'];
    const cg=ctx.createRadialGradient(0,0,0,0,0,s*0.4);
    cg.addColorStop(0,coreColor[0]);cg.addColorStop(1,coreColor[1]);
    ctx.beginPath();ctx.arc(0,0,s*0.4,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
    // Cannon barrels
    [Math.PI/2, Math.PI/2+0.6, Math.PI/2-0.6].forEach(a=>{
      ctx.save();ctx.rotate(a);
      ctx.fillStyle='rgba(180,0,255,0.7)';
      ctx.fillRect(-6,s*0.3,12,s*0.6);
      const bg2=ctx.createLinearGradient(0,s*0.3,0,s*0.9);
      bg2.addColorStop(0,'rgba(255,100,255,0.5)');bg2.addColorStop(1,'rgba(200,0,255,0.1)');
      ctx.fillStyle=bg2;ctx.fillRect(-6,s*0.3,12,s*0.6);
      ctx.restore();
    });
    // Eyes
    [[-s*0.25,-s*0.1],[s*0.25,-s*0.1]].forEach(([ex,ey])=>{
      ctx.beginPath();ctx.arc(ex,ey,8,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,${phase===3?200:50},0,0.9)`;ctx.fill();
      const eg2=ctx.createRadialGradient(ex,ey,0,ex,ey,16);
      eg2.addColorStop(0,`rgba(255,${phase===3?200:50},0,0.3)`);eg2.addColorStop(1,'transparent');
      ctx.fillStyle=eg2;ctx.beginPath();ctx.arc(ex,ey,16,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
    // HP bar
    const bw=160,bh=8;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(x-bw/2,y-s-25,bw,bh);
    const pct=this.hp/this.maxHp;
    const hg=ctx.createLinearGradient(x-bw/2,0,x+bw/2,0);
    hg.addColorStop(0,'#ff0066');hg.addColorStop(1,'#dd00ff');
    ctx.fillStyle=hg;ctx.fillRect(x-bw/2,y-s-25,bw*pct,bh);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(x-bw/2,y-s-25,bw,bh);
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 11px Orbitron';ctx.textAlign='center';
    ctx.fillText('⬡ NEXUS DREADNOUGHT ⬡',x,y-s-30);
  }
}

// ── POWERUP ───────────────────────────────────
class Powerup {
  constructor(x,y) {
    this.x=x;this.y=y;
    this.types=['shield','rapid','spread','bomb','health'];
    this.weights=[2,3,3,1,2];
    const r=Math.random()*this.weights.reduce((a,b)=>a+b);
    let s=0;
    for (let i=0;i<this.weights.length;i++){s+=this.weights[i];if(r<s){this.type=this.types[i];break;}}
    this.dead=false;this.t=0;this.vy=1.5;
    this.configs={
      shield:{color:'#00eeff',emoji:'🛡',label:'SHIELD'},
      rapid:{color:'#ffcc00',emoji:'⚡',label:'RAPID'},
      spread:{color:'#00ff88',emoji:'💠',label:'SPREAD'},
      bomb:{color:'#ff6600',emoji:'💣',label:'BOMB'},
      health:{color:'#ff4466',emoji:'❤',label:'HEAL'}
    };
    this.c=this.configs[this.type];
  }
  update(){this.t++;this.y+=this.vy;if(this.y>H+50)this.dead=true;}
  draw(){
    const {x,y,t,c}=this;
    ctx.save();ctx.translate(x,y+Math.sin(t*0.05)*4);
    // Glow
    const g=ctx.createRadialGradient(0,0,0,0,0,28);
    g.addColorStop(0,c.color+'66');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();
    // Hexagon
    ctx.beginPath();
    for (let i=0;i<6;i++){const a=i*Math.PI/3+t*0.02;ctx.lineTo(Math.cos(a)*18,Math.sin(a)*18);}
    ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
    ctx.strokeStyle=c.color;ctx.lineWidth=2;ctx.stroke();
    ctx.font='16px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.emoji,0,0);
    ctx.restore();
  }
  collect() {
    sfxPowerup();
    if (this.type==='shield'){player.shield=360;}
    else if (this.type==='rapid'){player.rapid=300;}
    else if (this.type==='spread'){player.spread=360;}
    else if (this.type==='bomb'){bombs=Math.min(5,bombs+1);updateBombCount();}
    else if (this.type==='health'){player.hp=Math.min(player.maxHp,player.hp+40);updateHealth();}
    updatePowerIcons();
    // Flash message
    showCombo(this.c.label+'!');
  }
}

// ── WAVE SYSTEM ───────────────────────────────
let waveEnemies=[];let waveTimer=0;let waveDone=false;let bossWave=false;
let waveSpawnQueue=[];let nextWaveTimer=0;
let spawnInterval=0;

function buildWave(w) {
  waveSpawnQueue=[];
  bossWave=(w%5===0);
  if (bossWave) {
    waveSpawnQueue.push({type:'boss',delay:0});
  } else {
    const count=5+w*2;
    for (let i=0;i<count;i++) {
      const t=w<3?'basic':Math.random()<0.3?'tank':Math.random()<0.3?'zigzag':'basic';
      waveSpawnQueue.push({type:t,delay:i*30+(Math.random()*20|0)});
    }
  }
}

function spawnFromQueue() {
  if (!waveSpawnQueue.length) return;
  waveTimer++;
  while (waveSpawnQueue.length && waveSpawnQueue[0].delay<=waveTimer) {
    const e=waveSpawnQueue.shift();
    const x=60+Math.random()*(W-120);
    if (e.type==='boss') enemies.push(new BossEnemy(wave));
    else if (e.type==='tank') enemies.push(new TankEnemy(x,-60,wave));
    else if (e.type==='zigzag') enemies.push(new ZigzagEnemy(x,-40,wave));
    else enemies.push(new BasicEnemy(x,-50,wave));
  }
}

function announceWave(w) {
  const el=document.getElementById('wave-announce');
  const wt=document.getElementById('wave-text');
  const ws=document.getElementById('wave-sub');
  const isBoss=w%5===0;
  wt.textContent=isBoss?`⚠ BOSS WAVE`:`WAVE ${w}`;
  ws.textContent=isBoss?'NEXUS DREADNOUGHT INCOMING':'PREPARE FOR BATTLE';
  wt.style.color=isBoss?'#ff4466':'#fff';
  el.style.transition='opacity 0.4s';el.style.opacity=1;
  setTimeout(()=>{el.style.opacity=0;},2000);
}

// ── JOYSTICK ──────────────────────────────────
let joyX=0,joyY=0,joyActive=false,joyId=null;
let autoFire=true,shootHeld=false;
const joyZone=document.getElementById('joystick-zone');
const joyKnob=document.getElementById('joystick-knob');
const shootBtn=document.getElementById('shoot-btn');
const bombBtn=document.getElementById('bomb-btn');
const R=50;

joyZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joyId=t.identifier;joyActive=true;},false);
joyZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for (let t of e.changedTouches){
    if (t.identifier===joyId){
      const rect=joyZone.getBoundingClientRect();
      const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
      const dx=t.clientX-cx,dy=t.clientY-cy;
      const d=Math.min(Math.sqrt(dx*dx+dy*dy),R);
      const a=Math.atan2(dy,dx);
      joyX=Math.cos(a)*(d/R);joyY=Math.sin(a)*(d/R);
      joyKnob.style.transform=`translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;
    }
  }
},false);
['touchend','touchcancel'].forEach(ev=>joyZone.addEventListener(ev,e=>{
  joyX=0;joyY=0;joyActive=false;joyId=null;
  joyKnob.style.transform='translate(-50%,-50%)';
},false));

bombBtn.addEventListener('touchstart',e=>{e.preventDefault();useBomb();},false);

// ── UI UPDATES ────────────────────────────────
function updateScore() {
  const el=document.getElementById('score');
  el.textContent=String(score).padStart(6,'0');
  el.style.transform='scale(1.1)';setTimeout(()=>el.style.transform='',100);
}
function updateHealth() {
  const pct=Math.max(0,player.hp/player.maxHp)*100;
  document.getElementById('health-bar').style.width=pct+'%';
  const hue=pct>50?120:pct>25?40:0;
  document.getElementById('health-bar').style.background=`linear-gradient(90deg,hsl(${hue},90%,45%),hsl(${hue},90%,65%))`;
}
function updatePowerIcons() {
  document.getElementById('picon-shield').style.opacity=player.shield>0?1:0.3;
  document.getElementById('picon-rapid').style.opacity=player.rapid>0?1:0.3;
  document.getElementById('picon-spread').style.opacity=player.spread>0?1:0.3;
}
function updateBombCount(){document.getElementById('bomb-count').textContent=bombs;}

let comboTO=null;
function showCombo(txt) {
  const el=document.getElementById('combo-display');
  el.textContent=txt;el.style.opacity=1;
  clearTimeout(comboTO);comboTO=setTimeout(()=>el.style.opacity=0,1200);
}

function useBomb() {
  if (bombs<=0||state!=='playing') return;
  bombs--;updateBombCount();
  sfxBomb();
  // Nuke all enemies
  enemies.forEach(e=>{bigExplosion(e.x,e.y,false);addScore(e.points/2|0,e.x,e.y);e.dead=true;});
  enemyBullets.length=0;
  // Screen flash
  const flash={x:0,y:0,dead:false,t:0,update(){this.t++;if(this.t>15)this.dead=true;},draw(){
    ctx.save();ctx.globalAlpha=(15-this.t)/15*0.5;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();
  }};
  particles.push(flash);
}

function addScore(pts,x,y) {
  score+=pts;updateScore();
  kills++;
  // Floating score text
  particles.push({x:x||W/2,y:y||H/2,dead:false,t:0,pts,update(){this.t++;this.y-=0.8;if(this.t>45)this.dead=true;},
    draw(){ctx.save();ctx.globalAlpha=1-this.t/45;ctx.fillStyle='#ffcc00';ctx.font=`bold 16px Orbitron`;
    ctx.textAlign='center';ctx.fillText('+'+this.pts,this.x,this.y);ctx.restore();}});
}

// ── COLLISION ─────────────────────────────────
function collide(ax,ay,ar,bx,by,br){return Math.hypot(ax-bx,ay-by)<ar+br;}

// ── MAIN GAME LOOP ────────────────────────────
let lastTime=0;
function gameLoop(ts) {
  if (state!=='playing'){requestAnimationFrame(gameLoop);return;}
  const dt=ts-lastTime;lastTime=ts;
  frameCount++;

  // Screen shake
  if (shake>0){shakeX=(Math.random()-0.5)*shake;shakeY=(Math.random()-0.5)*shake;shake*=0.85;if(shake<0.5){shake=0;shakeX=0;shakeY=0;}}
  ctx.save();ctx.translate(shakeX,shakeY);

  // Clear
  ctx.clearRect(-10,-10,W+20,H+20);

  // Moving stars
  stars.forEach(s=>{
    s.y+=s.speed;if(s.y>H)s.y=-5;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.color;ctx.globalAlpha=s.alpha*0.7;ctx.fill();ctx.globalAlpha=1;
  });

  // Spawn enemies
  spawnFromQueue();

  // Next wave
  if (!waveSpawnQueue.length && enemies.length===0 && state==='playing') {
    nextWaveTimer++;
    if (nextWaveTimer>120) {
      wave++;nextWaveTimer=0;waveTimer=0;
      document.getElementById('level-badge').textContent=`WAVE ${String(wave).padStart(2,'0')}`;
      buildWave(wave);announceWave(wave);
    }
  }

  // Update & draw particles (behind entities)
  particles = particles.filter(p=>{p.update();if(!p.dead)p.draw();return !p.dead;});

  // Update & draw powerups
  powerups = powerups.filter(p=>{
    p.update();p.draw();
    if (!p.dead && collide(p.x,p.y,18,player.x,player.y,28)){p.collect();p.dead=true;}
    return !p.dead;
  });

  // Update & draw player
  player.update();player.draw();
  updatePowerIcons();

  // Player bullets
  bullets = bullets.filter(b=>{
    b.update();b.draw();
    if (b.dead) return false;
    // vs enemies
    for (let i=enemies.length-1;i>=0;i--) {
      const e=enemies[i];
      const hr=e.type==='boss'?60:e.size||22;
      if (collide(b.x,b.y,b.r,e.x,e.y,hr)) {
        b.dead=true;
        const died=e.hit(10);
        if (died){
          bigExplosion(e.x,e.y,e.type==='boss'||e.type==='tank');
          addScore(e.points,e.x,e.y);
          if (Math.random()<0.25) powerups.push(new Powerup(e.x,e.y));
          kills++;
          combo++;comboTimer=180;
          if (combo>=3) showCombo(`COMBO ×${combo}`);
        } else {
          // Hit sparks
          for (let j=0;j<5;j++) particles.push(new Particle(b.x,b.y,(Math.random()-0.5)*4,(Math.random()-0.5)*4,3,0.8,'#fff','spark'));
        }
        break;
      }
    }
    return !b.dead;
  });

  // Combo decay
  if (comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0;}

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b=>{
    b.update();b.draw();
    if (b.dead) return false;
    if (player.invincible<=0 && collide(b.x,b.y,b.r,player.x,player.y,24)){
      b.dead=true;
      if (player.shield>0){player.shield=Math.max(0,player.shield-60);sfxHit();}
      else {
        player.hp-=12;sfxHit();updateHealth();
        player.invincible=30;shake=5;
        for (let j=0;j<8;j++) particles.push(new Particle(player.x,player.y,(Math.random()-0.5)*5,(Math.random()-0.5)*5,4,0.85,'#ff4466','spark'));
        if (player.hp<=0) gameOver();
      }
    }
    return !b.dead;
  });

  // Enemies
  enemies = enemies.filter(e=>{
    e.update();e.draw();
    // vs player collision
    if (e.type!=='boss'&&player.invincible<=0&&collide(e.x,e.y,e.size||20,player.x,player.y,28)){
      if (player.shield>0){player.shield=0;}
      else {player.hp-=25;updateHealth();player.invincible=60;shake=12;sfxHit();}
      bigExplosion(e.x,e.y);e.dead=true;
      if (player.hp<=0) gameOver();
    }
    return !e.dead;
  });

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// ── GAME LIFECYCLE ────────────────────────────
function startGame() {
  initAudio();
  score=0;wave=1;kills=0;bombs=3;combo=0;comboTimer=0;frameCount=0;
  player=new Player();
  bullets=[];enemyBullets=[];enemies=[];particles=[];powerups=[];
  waveSpawnQueue=[];waveTimer=0;nextWaveTimer=0;
  updateScore();updateHealth();updateBombCount();updatePowerIcons();
  document.getElementById('level-badge').textContent='WAVE 01';
  document.getElementById('start-screen').classList.remove('active');
  document.getElementById('over-screen').classList.remove('active');
  document.getElementById('screens').style.display='none';
  document.getElementById('joystick-zone').style.display='block';
  document.getElementById('shoot-btn').style.display='none'; // auto-fire mode
  document.getElementById('bomb-btn').style.display='flex';
  state='playing';gameActive=true;
  buildWave(wave);announceWave(wave);
  initStars();
  requestAnimationFrame(gameLoop);
}

function gameOver() {
  state='over';gameActive=false;
  if (score>bestScore) bestScore=score;
  document.getElementById('final-score').textContent=score.toLocaleString();
  document.getElementById('best-score-val').textContent=bestScore.toLocaleString();
  document.getElementById('wave-reached').textContent=wave;
  document.getElementById('kills-val').textContent=kills;
  document.getElementById('joystick-zone').style.display='none';
  document.getElementById('shoot-btn').style.display='none';
  document.getElementById('bomb-btn').style.display='none';
  document.getElementById('screens').style.display='flex';
  // Death explosion
  bigExplosion(player.x,player.y,true);
  setTimeout(()=>{document.getElementById('over-screen').classList.add('active');},1500);
}

// ── KEYBOARD CONTROLS (desktop) ───────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;initAudio();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
// Override joystick with keyboard
function keyboardJoy(){
  if (state!=='playing') return;
  joyX=(keys['ArrowLeft']||keys['KeyA'])?-1:(keys['ArrowRight']||keys['KeyD'])?1:0;
  joyY=(keys['ArrowUp']||keys['KeyW'])?-1:(keys['ArrowDown']||keys['KeyS'])?1:0;
  shootHeld=keys['Space']||keys['KeyZ'];
  if (keys['KeyX']&&!keys['_bombPressed']){useBomb();keys['_bombPressed']=true;}
  if (!keys['KeyX'])keys['_bombPressed']=false;
}
setInterval(keyboardJoy,16);

// ── TOUCH INIT ────────────────────────────────
document.addEventListener('touchstart',()=>initAudio(),{once:true});

// ── BACKGROUND DRAW ───────────────────────────
// Draw initial background
const tmpBgCanvas=document.createElement('canvas');tmpBgCanvas.width=400;tmpBgCanvas.height=400;
const tmpCtx=tmpBgCanvas.getContext('2d');
const grad0=tmpCtx.createRadialGradient(200,200,0,200,200,300);
grad0.addColorStop(0,'#020a18');grad0.addColorStop(1,'#000005');
tmpCtx.fillStyle=grad0;tmpCtx.fillRect(0,0,400,400);
bgCtx.fillStyle='#000005';bgCtx.fillRect(0,0,W,H);

// Draw stars on bg once
for (let i=0;i<80;i++){
  bgCtx.beginPath();bgCtx.arc(Math.random()*W,Math.random()*H,Math.random()*1.5+0.5,0,Math.PI*2);
  bgCtx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.1})`;bgCtx.fill();
}

// ── START ─────────────────────────────────────
// Initial star init for start screen animation
stars=[];
for (let i=0;i<150;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,speed:Math.random()*1.5+0.3,alpha:Math.random()*0.8+0.2,color:['#fff','#aaddff','#ccccff'][Math.floor(Math.random()*3)]});

function menuLoop(ts) {
  if (state!=='menu'){return;}
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{s.y+=s.speed;if(s.y>H)s.y=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.color;ctx.globalAlpha=s.alpha*0.6;ctx.fill();ctx.globalAlpha=1;});
  requestAnimationFrame(menuLoop);
}
state='menu';requestAnimationFrame(menuLoop);
</script>
