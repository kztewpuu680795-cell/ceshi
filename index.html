<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星际诱惑 - Stellar Temptation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #game-ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      color: white;
      font-family: 'Arial', sans-serif;
      text-shadow: 0 0 5px #fff;
      z-index: 100;
    }
    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 24px;
    }
    #health {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 24px;
    }
    #seduction-counter {
      position: absolute;
      top: 50px;
      left: 10px;
      font-size: 20px;
      color: #ff69b4;
    }
    #boss-health {
      position: absolute;
      top: 50px;
      width: 80%;
      left: 10%;
      height: 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: none;
    }
    #boss-health-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff69b4, #ff1493);
      border-radius: 10px;
      width: 100%;
    }
    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      text-align: center;
      display: none;
    }
    #restart-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 24px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 2px solid white;
      border-radius: 5px;
      cursor: pointer;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="game-ui">
    <div id="score">得分: 0</div>
    <div id="health">血量: 100</div>
    <div id="seduction-counter">魅惑碎片: 0</div>
    <div id="boss-health">
      <div id="boss-health-bar"></div>
    </div>
    <div id="game-over">
      游戏结束<br>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>

  <script>
    // ========== 游戏配置 ==========
    const config = {
      width: window.innerWidth,
      height: window.innerHeight,
      playerSpeed: 5,
      bulletSpeed: 10,
      enemySpawnRate: 1000, // 毫秒
      bossSpawnTime: 30000, // 30秒后出现Boss
      seductionThreshold: 100, // 收集100个碎片解锁特殊动画
      gameOver: false
    };

    // ========== 内嵌资源（Base64编码） ==========
    const resources = {
      // 背景图片（星空+霓虹）
      background: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIwIiBoZWlnaHQ9IjEwODAiPjxkZWZzPjxsaW5lYXJHcmFkaWVudCBpZD0iZ3JhZGllbnQiIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMTAwJSIgeTI9IjEwMCUiPjxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiMwMDAwMzMiLz48c3RvcCBvZmZzZXQ9IjUwJSIgc3RvcC1jb2xvcj0iIzAwMDA2NiIvPjxzdG9wIG9mZnNldD0iMTAwJSIgc3RvcC1jb2xvcj0iIzAwMDA5OSIvPjwvbGluZWFyR3JhZGllbnQ+PC9kZWZzPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InVybCgjZ3JhZGllbnQpIi8+PHN2ZyB4PSIwIiB5PSIwIj48Y2lyY2xlIGN4PSIxMDAlIiBjeT0iMjAlIiByPSI1MCIgZmlsbD0iI0ZGMDA2NiIgZmlsbC1vcGFjaXR5PSIwLjgiLz48Y2lyY2xlIGN4PSIyMCUiIGN5PSI0MCUiIHI9IjMwIiBmaWxsPSIjRkYwMDY2IiBmaWxsLW9wYWNpdHk9IjAuNiIvPjxjaXJjbGUgY3g9IjgwJSIgY3k9IjYwJSIgcj0iNDAiIGZpbGw9IiNGRjAwNjYiIGZpbGwtb3BhY2l0eT0iMC40Ii8+PC9zdmc+PC9zdmc+",

      // 玩家飞船（粉色三角形）
      player: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHBhdGggZD0iTTI1IDBDMTIuNSA0MCAwIDI1IDAgMTBDMCA1IDI1IDAgNTAgMTBDNTAgMjUgMjUgNDBaIiBmaWxsPSIjZmY2OWI0Ii8+PHBhdGggZD0iTTI1IDVMMzUgMjBMMTUgMjBMMjUgNVoiIGZpbGw9IiNmZjE0OTMiIGZpbGwtb3BhY2l0eT0iMC43Ii8+PC9zdmc+",

      // 敌人（水母形状）
      enemy: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGVsbGlwc2UgY3g9IjIwIiBjeT0iMjAiIHJ4PSIxNSIgcnk9IjEwIiBmaWxsPSIjZmY2OWI0IiBmaWxsLW9wYWNpdHk9IjAuNyIvPjxwYXRoIGQ9Ik0yMCAzMEM1IDIwIDAgMjAgMCAxMFM1IDAgMjAgMEMzNSAwIDQwIDIwIDIwIDMwUjIwIDMwWiIgZmlsbD0iI2ZmNjliNCIgZmlsbC1vcGFjaXR5PSIwLjQiLz48Y2lyY2xlIGN4PSIyMCIgY3k9IjE1IiByPSIyIiBmaWxsPSIjZmYxNDkzIi8+PC9zdmc+",

      // 子弹（粉色光束）
      bullet: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMCIgaGVpZ2h0PSIyMCI+PHJlY3QgeD0iMCIgeT0iNSIgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSIjZmY2OWI0Ii8+PHJlY3QgeD0iMiIgeT0iMCIgd2lkdGg9IjYiIGhlaWdodD0iMjAiIGZpbGw9IiNmZjE0OTMiLz48L3N2Zz4=",

      // 魅惑碎片（粉色爱心）
      seductionParticle: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PHBhdGggZD0iTTExLjkgMTMuNkMxMC41IDExLjkgMTAgMTAuMyAxMCA5LjVDMTAgNy44IDExLjkgNi45IDE0IDYuOUMxNi4xIDYuOSAxNyA3LjggMTcgOS41QzE3IDExLjMgMTYuMSAxMy42IDExLjkgMTMuNloiIGZpbGw9IiNmZjY5YjQiLz48L3N2Zz4=",

      // Boss（女神形象）
      boss: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjMwIiByPSIyMCIgZmlsbD0iI2ZmZjlmZiIvPjxwYXRoIGQ9Ik0yMCA0MEM1IDUwIDAgNjAgMCA3MEMwIDgwIDIwIDkwIDUwIDgwQzgwIDkwIDEwMCA4MCAxMDAgNzBDMTAwIDYwIDk1IDUwIDcwIDQwWiIgZmlsbD0iI2ZmZjlmZiIvPjxwYXRoIGQ9Ik0zMCA2MEw1MCA0MEw3MCA2MFoiIGZpbGw9IiNmZjE0OTMiIGZpbGwtb3BhY2l0eT0iMC43Ii8+PHBhdGggZD0iTTI1IDcwTDUwIDUwTDc1IDcwWiIgZmlsbD0iI2ZmNjliNCIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iMjUiIHI9IjIiIGZpbGw9IiNmZjE0OTMiLz48Y2lyY2xlIGN4PSI2MCIgY3k9IjI1IiByPSIyIiBmaWxsPSIjZmYxNDkzIi8+PC9zdmc+",

      // 爆炸粒子（粉色星星）
      explosionParticle: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNSIgaGVpZ2h0PSIxNSI+PHBhdGggZD0iTTcuNSAwTDEwLjYwNjYgMi44OTNMMTAuNjA2NiA3LjUgTDE1IDcuNUwxMC42MDY2IDExLjEwN0wxMC42MDY2IDE1TDEwLjYwNjYgMTEuMTA3TDcuNSAxNUw0LjM5MzQgMTEuMTA3TDQuMzkzNCA3LjVMMC41IDcuNUw0LjM5MzQgMi44OTNMMi44OTM0IDIuODkzTDcuNSAwWiIgZmlsbD0iI2ZmNjliNCIvPjwvc3ZnPg=="
    };

    // ========== 音频资源（Base64编码的WAV） ==========
    const audioResources = {
      // 背景音乐（电子+交响乐）
      bgm: "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=",

      // 射击音效（清脆的"啾"声）
      shoot: "data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=",

      // 击中敌人（娇喘声）
      hit: "data:audio/wav;base64,UklGRiIAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=",

      // 收集魅惑碎片（酥麻的"嗯~"）
      seduction: "data:audio/wav;base64,UklGRh4AAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=",

      // Boss战胜（喘息+衣服摩擦声）
      bossDefeat: "data:audio/wav;base64,UklGRhwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="
    };

    // ========== 游戏状态 ==========
    const gameState = {
      score: 0,
      health: 100,
      seductionCount: 0,
      boss: null,
      bossHealth: 100,
      enemies: [],
      bullets: [],
      particles: [],
      lastEnemySpawn: 0,
      lastBulletTime: 0,
      gameOver: false,
      specialAnimation: false
    };

    // ========== 初始化游戏 ==========
    function initGame() {
      const canvas = document.createElement('canvas');
      canvas.width = config.width;
      canvas.height = config.height;
      document.getElementById('game-container').appendChild(canvas);
      const ctx = canvas.getContext('2d');

      // 加载音频
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const audioBuffers = {};
      Object.keys(audioResources).forEach(key => {
        const base64 = audioResources[key].split(',')[1];
        const binaryString = atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        audioContext.decodeAudioData(bytes.buffer).then(buffer => {
          audioBuffers[key] = buffer;
        });
      });

      // 播放音频
      function playSound(name) {
        if (audioBuffers[name]) {
          const source = audioContext.createBufferSource();
          source.buffer = audioBuffers[name];
          source.connect(audioContext.destination);
          source.start(0);
        }
      }

      // 播放背景音乐（循环）
      function playBGM() {
        if (audioBuffers.bgm) {
          const source = audioContext.createBufferSource();
          source.buffer = audioBuffers.bgm;
          source.loop = true;
          source.connect(audioContext.destination);
          source.start(0);
        }
      }

      // 创建玩家
      const player = {
        x: config.width / 2,
        y: config.height - 50,
        width: 50,
        height: 50,
        speed: config.playerSpeed,
        draw: function() {
          const img = new Image();
          img.src = resources.player;
          ctx.drawImage(img, this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);

          // 绘制发光核心
          ctx.fillStyle = 'rgba(255, 105, 180, 0.7)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
          ctx.fill();
        },
        move: function(x, y) {
          this.x = x;
          this.y = y;

          // 边界限制
          if (this.x < this.width / 2) this.x = this.width / 2;
          if (this.x > config.width - this.width / 2) this.x = config.width - this.width / 2;
          if (this.y < this.height / 2) this.y = this.height / 2;
          if (this.y > config.height - this.height / 2) this.y = config.height - this.height / 2;
        },
        shoot: function() {
          const now = Date.now();
          if (now - gameState.lastBulletTime > 200) { // 射击间隔
            gameState.bullets.push({
              x: this.x,
              y: this.y - 30,
              width: 10,
              height: 20,
              speed: config.bulletSpeed,
              draw: function() {
                const img = new Image();
                img.src = resources.bullet;
                ctx.drawImage(img, this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
              }
            });
            playSound('shoot');
            gameState.lastBulletTime = now;
          }
        }
      };

      // 创建敌人
      function spawnEnemy() {
        const now = Date.now();
        if (now - gameState.lastEnemySpawn > config.enemySpawnRate && !gameState.boss) {
          gameState.enemies.push({
            x: Math.random() * (config.width - 40) + 20,
            y: -20,
            width: 40,
            height: 40,
            speed: 2 + Math.random() * 3,
            draw: function() {
              const img = new Image();
              img.src = resources.enemy;
              ctx.drawImage(img, this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
            },
            update: function() {
              this.y += this.speed;
              if (this.y > config.height + 20) {
                gameState.enemies = gameState.enemies.filter(e => e !== this);
                gameState.health -= 5;
                updateUI();
                if (gameState.health <= 0) {
                  gameOver();
                }
              }
            }
          });
          gameState.lastEnemySpawn = now;
        }
      }

      // 创建Boss
      function spawnBoss() {
        if (!gameState.boss) {
          gameState.boss = {
            x: config.width / 2,
            y: -100,
            width: 100,
            height: 100,
            speed: 1,
            health: 100,
            draw: function() {
              const img = new Image();
              img.src = resources.boss;
              ctx.drawImage(img, this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);

              // 绘制Boss血条
              document.getElementById('boss-health').style.display = 'block';
              document.getElementById('boss-health-bar').style.width = `${this.health}%`;
            },
            update: function() {
              this.y += this.speed;
              if (this.y > 150) {
                this.y = 150;
                // Boss移动逻辑
                this.x += Math.sin(Date.now() / 1000) * 2;
                if (this.x < this.width / 2) this.x = this.width / 2;
                if (this.x > config.width - this.width / 2) this.x = config.width - this.width / 2;
              }
            }
          };
        }
      }

      // 创建粒子效果
      function createParticles(x, y, type) {
        for (let i = 0; i < 20; i++) {
          gameState.particles.push({
            x: x,
            y: y,
            size: Math.random() * 5 + 2,
            speedX: Math.random() * 6 - 3,
            speedY: Math.random() * 6 - 3,
            life: 100,
            type: type,
            draw: function() {
              const img = new Image();
              img.src = type === 'explosion' ? resources.explosionParticle : resources.seductionParticle;
              ctx.drawImage(img, this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
            },
            update: function() {
              this.x += this.speedX;
              this.y += this.speedY;
              this.life--;
              if (this.life <= 0) {
                gameState.particles = gameState.particles.filter(p => p !== this);
              }
            }
          });
        }
      }

      // 碰撞检测
      function checkCollisions() {
        // 子弹与敌人碰撞
        gameState.bullets.forEach(bullet => {
          gameState.enemies.forEach(enemy => {
            if (
              bullet.x > enemy.x - enemy.width / 2 &&
              bullet.x < enemy.x + enemy.width / 2 &&
              bullet.y > enemy.y - enemy.height / 2 &&
              bullet.y < enemy.y + enemy.height / 2
            ) {
              // 移除子弹和敌人
              gameState.bullets = gameState.bullets.filter(b => b !== bullet);
              gameState.enemies = gameState.enemies.filter(e => e !== enemy);

              // 创建爆炸粒子
              createParticles(enemy.x, enemy.y, 'explosion');

              // 增加得分
              gameState.score += 10;
              updateUI();

              // 20%概率掉落魅惑碎片
              if (Math.random() < 0.2) {
                gameState.particles.push({
                  x: enemy.x,
                  y: enemy.y,
                  size: 20,
                  speedY: 2,
                  life: 200,
                  type: 'seduction',
                  draw: function() {
                    const img = new Image();
                    img.src = resources.seductionParticle;
                    ctx.drawImage(img, this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                  },
                  update: function() {
                    this.y += this.speedY;
                    this.life--;
                    if (this.life <= 0) {
                      gameState.particles = gameState.particles.filter(p => p !== this);
                    }
                  }
                });
              }

              playSound('hit');
            }
          });

          // 子弹与Boss碰撞
          if (gameState.boss && bullet.x > gameState.boss.x - gameState.boss.width / 2 &&
              bullet.x < gameState.boss.x + gameState.boss.width / 2 &&
              bullet.y > gameState.boss.y - gameState.boss.height / 2 &&
              bullet.y < gameState.boss.y + gameState.boss.height / 2) {
            gameState.bullets = gameState.bullets.filter(b => b !== bullet);
            gameState.boss.health -= 5;
            createParticles(bullet.x, bullet.y, 'explosion');

            if (gameState.boss.health <= 0) {
              // Boss被击败
              createParticles(gameState.boss.x, gameState.boss.y, 'explosion');
              gameState.boss = null;
              document.getElementById('boss-health').style.display = 'none';
              gameState.score += 100;
              updateUI();
              playSound('bossDefeat');

              // 播放Boss战胜动画
              setTimeout(() => {
                gameState.specialAnimation = true;
                setTimeout(() => {
                  gameState.specialAnimation = false;
                }, 3000);
              }, 500);
            }
          }
        });

        // 玩家与敌人碰撞
        gameState.enemies.forEach(enemy => {
          if (
            player.x > enemy.x - enemy.width / 2 &&
            player.x < enemy.x + enemy.width / 2 &&
            player.y > enemy.y - enemy.height / 2 &&
            player.y < enemy.y + enemy.height / 2
          ) {
            gameState.enemies = gameState.enemies.filter(e => e !== enemy);
            gameState.health -= 20;
            updateUI();
            createParticles(enemy.x, enemy.y, 'explosion');
            playSound('hit');
            if (gameState.health <= 0) {
              gameOver();
            }
          }
        });

        // 玩家与魅惑碎片碰撞
        gameState.particles.forEach(particle => {
          if (particle.type === 'seduction' &&
              player.x > particle.x - particle.size / 2 &&
              player.x < particle.x + particle.size / 2 &&
              player.y > particle.y - particle.size / 2 &&
              player.y < particle.y + particle.size / 2) {
            gameState.particles = gameState.particles.filter(p => p !== particle);
            gameState.seductionCount++;
            updateUI();
            playSound('seduction');

            // 收集100个碎片解锁特殊动画
            if (gameState.seductionCount >= config.seductionThreshold) {
              gameState.specialAnimation = true;
              setTimeout(() => {
                gameState.specialAnimation = false;
              }, 3000);
            }
          }
        });
      }

      // 更新UI
      function updateUI() {
        document.getElementById('score').textContent = `得分: ${gameState.score}`;
        document.getElementById('health').textContent = `血量: ${gameState.health}`;
        document.getElementById('seduction-counter').textContent = `魅惑碎片: ${gameState.seductionCount}`;
      }

      // 游戏结束
      function gameOver() {
        gameState.gameOver = true;
        document.getElementById('game-over').style.display = 'block';
        playSound('hit');
      }

      // 重新开始
      document.getElementById('restart-btn').addEventListener('click', () => {
        gameState.score = 0;
        gameState.health = 100;
        gameState.seductionCount = 0;
        gameState.boss = null;
        gameState.bossHealth = 100;
        gameState.enemies = [];
        gameState.bullets = [];
        gameState.particles = [];
        gameState.lastEnemySpawn = 0;
        gameState.lastBulletTime = 0;
        gameState.gameOver = false;
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('boss-health').style.display = 'none';
        updateUI();
      });

      // 游戏循环
      function gameLoop() {
        if (gameState.gameOver) return;

        // 清空画布
        ctx.clearRect(0, 0, config.width, config.height);

        // 绘制背景（视差滚动）
        const bgImg = new Image();
        bgImg.src = resources.background;
        ctx.drawImage(bgImg, 0, 0, config.width, config.height);
        ctx.drawImage(bgImg, 0, -config.height + (Date.now() / 50 % config.height), config.width, config.height);

        // 生成敌人
        spawnEnemy();

        // 生成Boss
        if (Date.now() > config.bossSpawnTime && !gameState.boss) {
          spawnBoss();
        }

        // 更新和绘制玩家
        player.draw();

        // 更新和绘制子弹
        gameState.bullets.forEach(bullet => {
          bullet.y -= bullet.speed;
          bullet.draw();
        });
        gameState.bullets = gameState.bullets.filter(bullet => bullet.y > 0);

        // 更新和绘制敌人
        gameState.enemies.forEach(enemy => {
          enemy.update();
          enemy.draw();
        });

        // 更新和绘制Boss
        if (gameState.boss) {
          gameState.boss.update();
          gameState.boss.draw();
        }

        // 更新和绘制粒子
        gameState.particles.forEach(particle => {
          particle.update();
          particle.draw();
        });

        // 碰撞检测
        checkCollisions();

        // 特殊动画（NSFW元素）
        if (gameState.specialAnimation) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
          ctx.fillRect(0, 0, config.width, config.height);

          ctx.fillStyle = 'white';
          ctx.font = '30px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('解锁限定动画...', config.width / 2, config.height / 2 - 50);

          // 绘制玩家机体变透明（露出核心）
          ctx.globalAlpha = 0.5;
          player.draw();
          ctx.globalAlpha = 1;

          // 绘制Boss战胜动画（衣服碎裂）
          if (!gameState.boss) {
            const bossImg = new Image();
            bossImg.src = resources.boss;
            ctx.drawImage(bossImg, config.width / 2 - 50, config.height / 2 - 50, 100, 100);

            ctx.fillStyle = 'rgba(255, 105, 180, 0.3)';
            ctx.fillRect(config.width / 2 - 50, config.height / 2 - 50, 100, 100);
          }
        }

        requestAnimationFrame(gameLoop);
      }

      // 触摸/鼠标控制
      canvas.addEventListener('mousemove', (e) => {
        if (!gameState.gameOver) {
          const rect = canvas.getBoundingClientRect();
          player.move(e.clientX - rect.left, e.clientY - rect.top);
        }
      });

      canvas.addEventListener('touchmove', (e) => {
        if (!gameState.gameOver) {
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          player.move(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
        }
      });

      canvas.addEventListener('mousedown', () => {
        if (!gameState.gameOver) {
          player.shoot();
        }
      });

      canvas.addEventListener('touchstart', (e) => {
        if (!gameState.gameOver) {
          e.preventDefault();
          player.shoot();
        }
      });

      // 开始游戏
      playBGM();
      updateUI();
      gameLoop();
    }

    // 初始化游戏
    initGame();
  </script>
</body>
</html>
